# CREDIT v2 — WXFormer v2 @ 0.25 deg, 6-hr timestep — PILOT (parallelism test)
# Short-run training to verify each parallelism mode produces decreasing loss.
# Same model and data as wxformer_v2_025deg_6hr.yml; fewer epochs/batches.
#
# Submit via: scripts/derecho_025deg_sweep.sh
# which generates one job per parallelism mode.

save_loc: '/glade/derecho/scratch/$USER/CREDIT_runs/wxformer_v2_025deg_pilot'
seed: 1000

data:
    source:
        ERA5:
            level_coord: "level"
            levels: [10, 30, 40, 50, 60, 70, 80, 90, 95, 100, 105, 110, 120, 130, 136, 137]
            variables:
                prognostic:
                    vars_3D: ['U', 'V', 'T', 'Q']
                    vars_2D: ['SP', 't2m', 'U500', 'V500', 'T500', 'Z500', 'Q500']
                    path: '/glade/campaign/cisl/aiml/wchapman/MLWPS/STAGING/SixHourly_y_TOTAL_*_staged.zarr'

                diagnostic: null

                dynamic_forcing:
                    vars_2D: ['tsi']
                    path: '/glade/derecho/scratch/dgagne/credit_solar_nc_6h_0.25deg/*.nc'

                static:
                    vars_2D: ['Z_GDS4_SFC', 'LSM']
                    path: '/glade/derecho/scratch/ksha/CREDIT_data/static_norm_old.nc'

    start_datetime: "1979-01-01"
    end_datetime: "2018-12-31"
    timestep: "6h"
    history_len: 1
    forecast_len: 1
    one_shot: True
    lead_time_periods: 6
    skip_periods: null
    static_first: True
    scaler_type: 'std_new'

    mean_path: '/glade/derecho/scratch/ksha/CREDIT_data/mean_6h_1979_2018_16lev_0.25deg.nc'
    std_path: '/glade/derecho/scratch/ksha/CREDIT_data/std_residual_6h_1979_2018_16lev_0.25deg.nc'

data_valid:
    source:
        ERA5:
            level_coord: "level"
            levels: [10, 30, 40, 50, 60, 70, 80, 90, 95, 100, 105, 110, 120, 130, 136, 137]
            variables:
                prognostic:
                    vars_3D: ['U', 'V', 'T', 'Q']
                    vars_2D: ['SP', 't2m', 'U500', 'V500', 'T500', 'Z500', 'Q500']
                    path: '/glade/campaign/cisl/aiml/wchapman/MLWPS/STAGING/SixHourly_y_TOTAL_*_staged.zarr'

                diagnostic: null

                dynamic_forcing:
                    vars_2D: ['tsi']
                    path: '/glade/derecho/scratch/dgagne/credit_solar_nc_6h_0.25deg/*.nc'

                static:
                    vars_2D: ['Z_GDS4_SFC', 'LSM']
                    path: '/glade/derecho/scratch/ksha/CREDIT_data/static_norm_old.nc'

    start_datetime: "2019-01-01"
    end_datetime: "2020-12-31"
    timestep: "6h"
    history_len: 1
    forecast_len: 1
    one_shot: True
    lead_time_periods: 6
    skip_periods: null
    static_first: True
    scaler_type: 'std_new'

    mean_path: '/glade/derecho/scratch/ksha/CREDIT_data/mean_6h_1979_2018_16lev_0.25deg.nc'
    std_path: '/glade/derecho/scratch/ksha/CREDIT_data/std_residual_6h_1979_2018_16lev_0.25deg.nc'

trainer:
    type: era5-v2
    # ── parallelism set per-job by derecho_025deg_sweep.sh ───────────────
    parallelism:
        data: fsdp2
        tensor: 1
        domain: 1

    activation_checkpoint: True
    cpu_offload: False

    load_weights: False
    load_optimizer: False
    load_scaler: False
    load_scheduler: False

    skip_validation: False
    update_learning_rate: False

    save_backup_weights: False
    save_best_weights: True

    learning_rate: 1.0e-04
    weight_decay: 1.0e-05

    train_batch_size: 1
    valid_batch_size: 1

    batches_per_epoch: 200
    valid_batches_per_epoch: 50
    stopping_patience: 999

    start_epoch: 0
    num_epoch: 10
    reload_epoch: False
    epochs: &epochs 10

    use_ema: False
    use_scheduler: False

    amp: True

    grad_accum_every: 1
    grad_max_norm: 1.0

    thread_workers: 4
    valid_thread_workers: 2

model:
    type: "wxformer_v2"
    frames: 1
    image_height: 640
    image_width: 1280
    levels: 16
    channels: 4
    surface_channels: 7
    input_only_channels: 3
    output_only_channels: 0

    dim: [128, 256, 512, 1024]
    depth: [2, 2, 6, 2]
    global_window_size: [8, 4, 2, 1]
    local_window_size: 3

    upsample_with_ps: True
    use_swiglu: True
    use_shifted_windows: True
    use_deformable: False
    use_spectral_norm: True

    padding_conf:
        activate: True
        mode: earth
        pad_lat: [64, 64]   # 640+128=768; domain=2: shard=384; 384/4=96/2=48/2=24/2=12; 12%3=0 ✓
        pad_lon: [32, 32]   # 1280+64=1344; 1344//32=42, 42%3=0 ✓

    post_conf:
        activate: False

loss:
    training_loss: "mse"
    validation_loss: "mse"
    use_latitude_weights: False

predict:
    mode: none
    batch_size: 1
