# Smoke test — Gen1 trainer, 0.25° 16-level model-level ERA5
# Same data layout as the Nature paper (wxformer_6h_single_step):
#   upper-air+surface from SixHourly_y_TOTAL zarr, tsi from solar NC, static from static_norm_old.nc
# Reduced model size and 2-year training window for quick Casper single-GPU validation.

save_loc: '/glade/derecho/scratch/schreck/credit_tests/smoke_gen1'
seed: 1000

data:
    variables: ['U', 'V', 'T', 'Q']
    save_loc: '/glade/campaign/cisl/aiml/credit/era5_zarr/SixHourly_y_TOTAL*'

    surface_variables: ['SP', 't2m', 'V500', 'U500', 'T500', 'Z500', 'Q500']
    save_loc_surface: '/glade/campaign/cisl/aiml/credit/era5_zarr/SixHourly_y_TOTAL*'

    dynamic_forcing_variables: ['tsi']
    save_loc_dynamic_forcing: '/glade/campaign/cisl/aiml/credit/credit_solar_nc_6h_0.25deg/*.nc'

    static_variables: ['Z_GDS4_SFC', 'LSM']
    save_loc_static: '/glade/campaign/cisl/aiml/credit/static_scalers/static_norm_old.nc'

    mean_path: '/glade/campaign/cisl/aiml/credit/static_scalers/mean_6h_1979_2018_16lev_0.25deg.nc'
    std_path: '/glade/campaign/cisl/aiml/credit/static_scalers/std_6h_1979_2018_16lev_0.25deg.nc'

    level_ids: [10, 30, 40, 50, 60, 70, 80, 90, 95, 100, 105, 110, 120, 130, 136, 137]

    train_years: [2015, 2016]
    valid_years: [2017, 2018]

    scaler_type: 'std_new'
    history_len: 1
    valid_history_len: 1
    forecast_len: 0
    valid_forecast_len: 0
    lead_time_periods: 6
    skip_periods: null
    static_first: True
    dataset_type: ERA5_MultiStep_Batcher

model:
    type: "wxformer"
    frames: 1
    image_height: 640
    image_width: 1280
    levels: 16
    channels: 4
    surface_channels: 7
    input_only_channels: 3
    output_only_channels: 0

    patch_width: 1
    patch_height: 1
    frame_patch_size: 1

    dim: [8, 16, 32, 64]
    dim_head: 8
    depth: [2, 2, 2, 2]
    global_window_size: [10, 5, 2, 1]
    local_window_size: 10
    cross_embed_kernel_sizes:
    - [4, 8, 16, 32]
    - [2, 4]
    - [2, 4]
    - [2, 4]
    cross_embed_strides: [2, 2, 2, 2]
    attn_dropout: 0.
    ff_dropout: 0.

    pad_lon: 80
    pad_lat: 80

    use_spectral_norm: True
    interp: True

    post_conf:
        activate: False

loss:
    training_loss: "mse"
    validation_loss: "mse"
    use_power_loss: False
    use_spectral_loss: False
    use_latitude_weights: True
    latitude_weights: '/glade/campaign/cisl/aiml/credit/static_scalers/LSM_static_variables_ERA5_zhght.nc'
    use_variable_weights: False

trainer:
    type: era5
    mode: none

    load_weights: False
    load_optimizer: False
    load_scaler: False
    load_scheduler: False

    save_backup_weights: False
    save_best_weights: True
    save_metric_vars: True

    update_learning_rate: False
    learning_rate: 1.0e-03
    weight_decay: 0

    train_batch_size: 1
    valid_batch_size: 1
    ensemble_size: 1

    batches_per_epoch: 5
    valid_batches_per_epoch: 2
    stopping_patience: 50
    skip_validation: False

    start_epoch: 0
    num_epoch: 1
    reload_epoch: False
    epochs: 1

    use_scheduler: True
    scheduler:
      scheduler_type: cosine-annealing-restarts
      first_cycle_steps: 50
      cycle_mult: 1.0
      max_lr: 1.0e-03
      min_lr: 1.0e-06
      warmup_steps: 10
      gamma: 1.0

    amp: False
    grad_accum_every: 1
    grad_max_norm: 1.0

    thread_workers: 4
    valid_thread_workers: 2
    prefetch_factor: 2

pbs:
    conda: "credit-main-casper"
    job_name: "smoke_gen1"
    nodes: 1
    ncpus: 8
    ngpus: 1
    mem: '64GB'
    walltime: '1:00:00'
    gpu_type: 'v100'
    project: 'NAML0001'
    queue: 'casper'
