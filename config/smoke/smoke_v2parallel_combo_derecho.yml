# Smoke test — era5-v2 trainer + FSDP2 + domain=2 combo, 4× A100 on Derecho develop queue
# 4 GPUs: 2 domain shards (latitude H-split) × 2 FSDP2 data-parallel replicas
# Exercises the full distributed_model_wrapper_v2 path:
#   domain parallel → tensor parallel (disabled) → FSDP2

save_loc: '/glade/derecho/scratch/schreck/credit_tests/smoke_v2parallel_combo'
seed: 1000

data:
  source:
    ERA5:
      level_coord: "level"
      levels: [10, 30, 40, 50, 60, 70, 80, 90, 95, 100, 105, 110, 120, 130, 136, 137]
      variables:
        prognostic:
          vars_3D: ["U", "V", "T", "Q"]
          vars_2D: ["SP", "t2m", "V500", "U500", "T500", "Z500", "Q500"]
          path: "/glade/campaign/cisl/aiml/credit/era5_zarr/SixHourly_y_TOTAL*"
          filename_time_format: "%Y"
        dynamic_forcing:
          vars_2D: ["tsi"]
          path: "/glade/campaign/cisl/aiml/credit/credit_solar_nc_6h_0.25deg/*.nc"
          filename_time_format: "%Y"
        static:
          vars_2D: ["Z_GDS4_SFC", "LSM"]
          path: "/glade/campaign/cisl/aiml/credit/static_scalers/static_norm_old.nc"
        diagnostic: null

  timestep: "6h"
  forecast_len: 1
  start_datetime: "2015-01-01"
  end_datetime: "2016-12-31"

validation_data:
  start_datetime: "2017-01-01"
  end_datetime: "2018-12-31"

preblocks:
  norm:
    type: era5_normalizer
    args:
      mean_path: "/glade/campaign/cisl/aiml/credit/static_scalers/mean_6h_1979_2018_16lev_0.25deg.nc"
      std_path:  "/glade/campaign/cisl/aiml/credit/static_scalers/std_6h_1979_2018_16lev_0.25deg.nc"

model:
    type: "crossformer"
    frames: 1
    image_height: 640   # 640 / domain=2 = 320 rows per shard
    image_width: 1280
    levels: 16
    channels: 4
    surface_channels: 7
    input_only_channels: 3
    output_only_channels: 0

    patch_width: 1
    patch_height: 1
    frame_patch_size: 1

    dim: [32, 64, 128, 256]
    depth: [2, 2, 2, 2]
    global_window_size: [10, 5, 2, 1]
    local_window_size: 10
    cross_embed_kernel_sizes:
    - [4, 8, 16, 32]
    - [2, 4]
    - [2, 4]
    - [2, 4]
    cross_embed_strides: [2, 2, 2, 2]
    attn_dropout: 0.
    ff_dropout: 0.

    use_spectral_norm: True
    interp: True

    padding_conf:
        activate: True
        mode: "earth"
        pad_lat: [80, 80]
        pad_lon: [80, 80]

    post_conf:
        activate: False

loss:
    training_loss: "mse"
    validation_loss: "mse"
    use_power_loss: False
    use_spectral_loss: False
    use_latitude_weights: True
    latitude_weights: '/glade/campaign/cisl/aiml/credit/static_scalers/LSM_static_variables_ERA5_zhght.nc'
    use_variable_weights: False

trainer:
    type: era5-v2
    mode: none

    # 2 domain shards × 2 FSDP2 replicas = 4 GPUs
    parallelism:
        data: fsdp2
        tensor: 1
        domain: 2

    load_weights: False
    load_optimizer: False
    load_scaler: False
    load_scheduler: False

    save_backup_weights: False
    save_best_weights: True
    save_metric_vars: True

    update_learning_rate: False
    learning_rate: 1.0e-03
    weight_decay: 0

    train_batch_size: 1
    valid_batch_size: 1
    ensemble_size: 1

    batches_per_epoch: 5
    valid_batches_per_epoch: 2
    stopping_patience: 50
    skip_validation: False

    start_epoch: 0
    num_epoch: 1
    reload_epoch: False
    epochs: 1

    use_scheduler: True
    scheduler:
      scheduler_type: cosine-annealing-restarts
      first_cycle_steps: 50
      cycle_mult: 1.0
      max_lr: 1.0e-03
      min_lr: 1.0e-06
      warmup_steps: 10
      gamma: 1.0

    amp: False   # FSDP2 uses MixedPrecisionPolicy
    grad_accum_every: 1
    grad_max_norm: 1.0

    thread_workers: 4
    valid_thread_workers: 2
    prefetch_factor: 2

pbs:
    conda: "/glade/work/schreck/conda-envs/credit-main-derecho"
    job_name: "smoke_v2_combo"
    project: "NAML0001"
    walltime: "01:00:00"
    nodes: 1
    ncpus: 64
    ngpus: 4
    mem: "480GB"
    queue: "develop@desched1"
