# Smoke test — Gen2 trainer + MultiSourceDataset, 0.25° 16-level model-level ERA5
# Same data layout as the Nature paper: upper-air+surface from SixHourly_y_TOTAL zarr,
# tsi from solar NC, static from static_norm_old.nc
# Reduced model size and 2-year training window for quick Casper single-GPU validation.

save_loc: '/glade/derecho/scratch/$USER/credit_tests/smoke_ens_gen2'
seed: 1000

data:
  source:
    ERA5:
      dataset_type: "local"
      level_coord: "level"
      levels: [10, 30, 40, 50, 60, 70, 80, 90, 95, 100, 105, 110, 120, 130, 136, 137]
      variables:
        prognostic:
          vars_3D: ["U", "V", "T", "Q"]
          vars_2D: ["SP", "t2m", "V500", "U500", "T500", "Z500", "Q500"]
          path: "/glade/campaign/cisl/aiml/credit/era5_zarr/SixHourly_y_TOTAL_%Y-*"
        dynamic_forcing:
          vars_2D: ["tsi"]
          path: "/glade/campaign/cisl/aiml/credit/credit_solar_nc_6h_0.25deg/solar_irradiance_%Y*.nc"
        static:
          vars_2D: ["Z_GDS4_SFC", "LSM"]
          path: "/glade/campaign/cisl/aiml/credit/static_scalers/static_norm_old.nc"
        diagnostic: null

  timestep: "6h"
  forecast_len: 1
  start_datetime: "2015-01-01"
  end_datetime: "2016-12-31"

validation_data:
  start_datetime: "2017-01-01"
  end_datetime: "2018-12-31"
  forecast_len: 1
  timestep: "6h"

preblocks:
  per_step:
    scaler:
      type: bridgescaler_transform
      args:
        scaler_path: '/glade/derecho/scratch/$USER/credit_tests/smoke_ens_gen2/scaler.json'
        variables:
        - ERA5/prognostic/3d/U
        - ERA5/prognostic/3d/V
        - ERA5/prognostic/3d/T
        - ERA5/prognostic/3d/Q
        - ERA5/prognostic/2d/SP
        - ERA5/prognostic/2d/t2m
        - ERA5/prognostic/2d/V500
        - ERA5/prognostic/2d/U500
        - ERA5/prognostic/2d/T500
        - ERA5/prognostic/2d/Z500
        - ERA5/prognostic/2d/Q500
        - ERA5/dynamic_forcing/2d/tsi
        method: transform
        scaler_params:
          channels_last: False
    concat:
      type: concat

postblocks:
  per_step:
    reconstruct:
      type: reconstruct
    scaler:
      type: bridgescaler_transform
      args:
        scaler_path: '/glade/derecho/scratch/$USER/credit_tests/smoke_ens_gen2/scaler.json'
        variables:
        - ERA5/prognostic/3d/U
        - ERA5/prognostic/3d/V
        - ERA5/prognostic/3d/T
        - ERA5/prognostic/3d/Q
        - ERA5/prognostic/2d/SP
        - ERA5/prognostic/2d/t2m
        - ERA5/prognostic/2d/V500
        - ERA5/prognostic/2d/U500
        - ERA5/prognostic/2d/T500
        - ERA5/prognostic/2d/Z500
        - ERA5/prognostic/2d/Q500
        method: inverse_transform

model:
    type: "wxformer"
    frames: 1
    image_height: 640
    image_width: 1280
    levels: 16
    channels: 4
    surface_channels: 7
    input_only_channels: 3
    output_only_channels: 0

    patch_width: 1
    patch_height: 1
    frame_patch_size: 1

    dim: [32, 64, 128, 256]
    depth: [2, 2, 2, 2]
    global_window_size: [10, 5, 2, 1]
    local_window_size: 10
    cross_embed_kernel_sizes:
    - [4, 8, 16, 32]
    - [2, 4]
    - [2, 4]
    - [2, 4]
    cross_embed_strides: [2, 2, 2, 2]
    attn_dropout: 0.1
    ff_dropout: 0.

    use_spectral_norm: True
    interp: True

    padding_conf:
        activate: True
        mode: "earth"
        pad_lat: [80, 80]
        pad_lon: [80, 80]

    post_conf:
        activate: False

loss:
    training_loss: "KCRPS"
    validation_loss: "mse"
    use_power_loss: False
    use_spectral_loss: False
    use_latitude_weights: False
    latitude_weights: '/glade/campaign/cisl/aiml/credit/static_scalers/LSM_static_variables_ERA5_zhght.nc'
    use_variable_weights: False

trainer:
    type: era5-gen2

    parallelism:
        data: ddp
        tensor: 1
        domain: 1

    load_weights: False
    load_optimizer: False
    load_scaler: False
    load_scheduler: False

    save_backup_weights: False
    save_best_weights: True
    save_metric_vars: True

    update_learning_rate: False
    learning_rate: 1.0e-03
    weight_decay: 0

    train_batch_size: 1
    valid_batch_size: 1
    ensemble_size: 2

    batches_per_epoch: 5
    valid_batches_per_epoch: 2
    stopping_patience: 50
    skip_validation: False

    start_epoch: 0
    # num_epoch: 1
    reload_epoch: False
    epochs: 2

    use_scheduler: True
    scheduler:
      scheduler_type: cosine-annealing-restarts
      first_cycle_steps: 50
      cycle_mult: 1.0
      max_lr: 1.0e-03
      min_lr: 1.0e-06
      warmup_steps: 10
      gamma: 1.0

    amp: False
    grad_accum_every: 1
    grad_max_norm: 1.0

    thread_workers: 4
    valid_thread_workers: 2
    prefetch_factor: 2

# ---- Inference (used by rollout_gen2.py, not training) ---- #
#
# run_mode selects between batch and single forecast without requiring CLI flags.
#   batch:  generates forecasts for a range of init times defined under batch_forecast.initialization
#   single: runs one forecast from a specific init time defined under single_forecast.start_datetime
#
# CLI overrides (all optional):
#   --run-mode batch|single     overrides run_mode
#   --init-time YYYY-MM-DDTHH  overrides single_forecast.start_datetime
#   --save-dir /path            overrides save_forecast
#
inference:
  run_mode: batch                   # batch | single
  mode: ddp                        # none | ddp | fsdp
  save_forecast: '/glade/derecho/scratch/$USER/CREDIT_runs/starter_gen2/rollout'

  batch_forecast:
    forecast_length: "10d"             # total forecast duration (total valid lead time)
    first_init_date: "2020-01-01"      # first init time; must be within data date range
    last_init_date: "2020-01-10"       # last init time; must be within data date range
    init_interval: "12h"               # interval between init times

  single_forecast:
    forecast_length: "10d"
    start_datetime: "2020-06-01T00:00Z"   # ISO 8601; must be within data date range
    # init_data block reserved for future GFS/GEFS IC support:
    # init_data:
    #   type: "gfs"                 # era5 (default) | gfs | gefs
    #   cache_path: "/glade/scratch/$USER/ic_cache"
    #   force_download: false

  output:
    format: netcdf              # netcdf | zarr

    # Temporal subsampling: only write steps whose forecast hour is a multiple
    # of this value. null = write every step.
    output_interval: null           # null | "6h" | "24h" | ...

    # Calendar-period grouping: how many steps to concatenate into one file.
    # Output lands in  save_forecast/YYYYMMDD_HHMMZ/  (one subdirectory per init time).
    # null    → one file per step:    2020-06-01_T0600Z.nc
    # "day"   → one file per day:     2020-06-01.nc
    # "month" → one file per month:   2020-06.nc
    # "year"  → one file per year:    2020.nc
    # "full"  → one file per run:     full.nc
    group_by: day           # null | "day" | "month" | "year" | "full"

    # Variable filter. null = save all predicted variables.
    # Each entry names a y_processed key (source/type/dim/varname).
    # For 3D variables, "levels" subsets by model-level value (matches
    # data.source.ERA5.levels); null or omitted = all levels.
    variables: null
    # variables:
    #   - name: "ERA5/prognostic/3d/temperature"
    #     levels: null                              # null = all levels
    #   - name: "ERA5/prognostic/3d/u_component_of_wind"
    #     levels: [500, 850, 1000]                  # subset to these model levels
    #   - name: "ERA5/prognostic/2d/SP"
    #   - name: "ERA5/diagnostic/2d/total_precipitation"

    # CF attribute metadata. null = no variable attributes added.
    metadata: "era5.yaml"

    # NetCDF encoding. "default" applies to all variables.
    # Per-variable overrides use the full y_processed key or the short variable name.
    encoding:
      dtype: float32
      zlib: true
      complevel: 4            # 1 (fast) to 9 (small); 4 is a good default
      # "ERA5/diagnostic/2d/total_precipitation":
      #   dtype: float64
      #   zlib: true
      #   complevel: 6


pbs:
    conda: "credit-casper"  # full path — avoids conda init issues in PBS
    job_name: "smoke_ens_gen2"
    project: "NAML0001"
    walltime: "01:00:00"
    ncpus: 8
    ngpus: 1
    mem: "64GB"
    gpu_type: "v100"
    # queue: "casper"   # default for casper; "main" for derecho
