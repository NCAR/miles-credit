# ---- Model architecture ---- #
# Must match the checkpoint — do not edit for the shipped model.
model:
  type: "camulator"
  frames: 1
  image_height: 192
  image_width: 288
  levels: 32
  channels: 4               # 3D prognostic: U V T Qtot
  surface_channels: 2       # 2D prognostic: PS TREFHT
  input_only_channels: 6    # dynamic_forcing (4) + static (2)
  output_only_channels: 17  # diagnostic variables

  patch_width: 1
  patch_height: 1
  frame_patch_size: 1

  dim: [256, 512, 1024, 2048]
  depth: [2, 2, 18, 2]
  global_window_size: [4, 4, 2, 1]
  local_window_size: 3
  cross_embed_kernel_sizes:
    - [4, 8, 16, 32]
    - [2, 4]
    - [2, 4]
    - [2, 4]
  cross_embed_strides: [2, 2, 2, 2]
  attn_dropout: 0.
  ff_dropout: 0.

  use_spectral_norm: True
  interp: True

  padding_conf:
    activate: True
    mode: earth
    pad_lat: [48, 48]
    pad_lon: [48, 48]


# ---- Loss ---- #
loss:
  training_loss: "mse"

  use_power_loss: False
  use_spectral_loss: False
  spectral_lambda_reg: 0.1
  spectral_wavenum_init: 20

  latitude_weights: "./climate/assets/f.e21.CREDIT_climate.statics_1.0deg_32levs_latlon_F32_hyai_fixed.nc"
  use_latitude_weights: True

  use_variable_weights: False


# ---- Inference ---- #
# run_mode selects between batch and single forecast.
#   batch:  generates forecasts for a range of init times defined under batch_forecast.initialization
#   single: runs one forecast from a specific init time defined under single_forecast.start_datetime
inference:
  run_mode: single
  mode: none                          # none | ddp | fsdp
  save_forecast: '/glade/derecho/scratch/$USER/camulator_test/rollout/'

  batch_forecast:
    forecast_length: "180d"                    # 1460 6-hourly steps = 1 no-leap year
    first_init_date: "1981-01-01"
    last_init_date: "1981-12-31"
    init_interval: "1d"

  single_forecast:
    forecast_length: "30d"                    # 1460 6-hourly steps = 1 no-leap year
    start_datetime: "1995-01-01T00:00Z"

  output:
    format: netcdf
    output_interval: null
    group_by: month
    metadata: "/glade/campaign/cisl/aiml/credit/cesm_exercise/camulator_metadata.yaml"
    variables:
#      - name: "CESM/prognostic/3d/U"
#      - name: "CESM/prognostic/3d/V"
#      - name: "CESM/prognostic/3d/T"
#      - name: "CESM/prognostic/3d/Qtot"
      - name: "CESM/prognostic/2d/PS"
      - name: "CESM/prognostic/2d/TREFHT"
      - name: "CESM/diagnostic/2d/PRECT"
      - name: "CESM/diagnostic/2d/TS"
      - name: "CESM/diagnostic/2d/CLDHGH"
      - name: "CESM/diagnostic/2d/CLDLOW"
      - name: "CESM/diagnostic/2d/CLDMED"
      - name: "CESM/diagnostic/2d/TAUX"
      - name: "CESM/diagnostic/2d/TAUY"
      - name: "CESM/diagnostic/2d/U10"
      - name: "CESM/diagnostic/2d/QFLX"
      - name: "CESM/diagnostic/2d/SHFLX"
      - name: "CESM/diagnostic/2d/LHFLX"
      - name: "CESM/diagnostic/2d/FSDS_J"
      - name: "CESM/diagnostic/2d/FLDS_J"
      - name: "CESM/diagnostic/2d/FSUS"
      - name: "CESM/diagnostic/2d/FLUS"
      - name: "CESM/diagnostic/2d/FSUTOA"
      - name: "CESM/diagnostic/2d/FLUT"
    encoding:
      dtype: float32
      zlib: true
      complevel: 0

pbs:
  conda: credit-aiml
  project: "NAML0001"
  job_name: "camulator"
  walltime: "00:30:00"
  ncpus: 8
  ngpus: 1
  mem: "64GB"
  gpu_type: "h100"