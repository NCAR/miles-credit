save_loc: /glade/derecho/scratch/$USER/CREDIT_runs/wxformer_cubesphere_next_wb2
seed: 1000
data:
  source:
    # Source name kept as ERA5 so the bridgescaler keys (ERA5/<field>/<dim>/<var>,
    # generated by `credit convert`) match the dataset's leaf keys at runtime.
    ERA5:
      dataset_type: weatherbench2_era5
      resolution: "1440x721"
      level_coord: level
      levels: [50, 100, 150, 200, 250, 300, 400, 500, 600, 700, 850, 925, 1000]
      variables:
        prognostic:
          vars_3D: [temperature, u_component_of_wind, v_component_of_wind, specific_humidity,
            geopotential, vertical_velocity, relative_humidity, vorticity, divergence]
          vars_2D: [surface_pressure, 2m_temperature, 10m_u_component_of_wind, 10m_v_component_of_wind,
            mean_sea_level_pressure, sea_surface_temperature, sea_ice_cover, snow_depth,
            total_cloud_cover, boundary_layer_height, total_column_water_vapour, total_column_water,
            volumetric_soil_water_layer_1, volumetric_soil_water_layer_2, volumetric_soil_water_layer_3,
            volumetric_soil_water_layer_4]
        static:
          vars_2D: [geopotential_at_surface, land_sea_mask, lake_cover, high_vegetation_cover,
            low_vegetation_cover, standard_deviation_of_filtered_subgrid_orography,
            standard_deviation_of_orography, angle_of_sub_gridscale_orography, anisotropy_of_sub_gridscale_orography,
            slope_of_sub_gridscale_orography, soil_type, type_of_high_vegetation,
            type_of_low_vegetation]
        diagnostic:
          vars_2D: [mean_surface_latent_heat_flux, mean_surface_sensible_heat_flux]
  timestep: 6h
  forecast_len: 1
  start_datetime: '1979-01-01'
  end_datetime: '2018-12-31'
trainer:
  type: era5-gen2
  use_ema: true
  ema_decay: 0.9999
  use_tensorboard: true
model:
  type: cube_sphere_wxformer_next
  se_index_path: /glade/work/schreck/repos/credit-mesaclip/mesaclip/static/se_index_ne120.npy
  adjacency_path: /glade/work/schreck/repos/credit-mesaclip/mesaclip/static/se_face_adjacency_ne120.npz
  frames: 1
  channels: 9
  surface_channels: 16
  input_only_channels: 13
  output_only_channels: 2
  levels: 13
  dim: [64, 128, 256, 512]
  depth: [2, 2, 8, 2]
  dim_head: 64
  face_attn_heads: 8
  global_window_size: [6, 6, 6, 6]
  local_window_size: 12
  cross_embed_strides: [2, 2, 2, 2]
  halo_size: 6
  edge_attn_heads: 4
  edge_attn_width: 2
  col_attn_heads: 3
  col_attn_stride: 4
  decoder_col_attn: false
  num_spectral_nodes: 64
  use_spectral_norm: true
validation_data:
  start_datetime: '2019-01-01'
  end_datetime: '2022-12-31'
preblocks:
  per_step:
    scaler:
      type: bridgescaler_transform
      args:
        scaler_path: config/gen_2/examples/wxformer_cubesphere_next_wb2_pre_scaler.json
        variables: [ERA5/prognostic/3d/temperature, ERA5/prognostic/3d/u_component_of_wind,
          ERA5/prognostic/3d/v_component_of_wind, ERA5/prognostic/3d/specific_humidity,
          ERA5/prognostic/3d/geopotential, ERA5/prognostic/3d/vertical_velocity, ERA5/prognostic/3d/relative_humidity,
          ERA5/prognostic/3d/vorticity, ERA5/prognostic/3d/divergence, ERA5/prognostic/2d/surface_pressure,
          ERA5/prognostic/2d/2m_temperature, ERA5/prognostic/2d/10m_u_component_of_wind,
          ERA5/prognostic/2d/10m_v_component_of_wind, ERA5/prognostic/2d/mean_sea_level_pressure,
          ERA5/prognostic/2d/sea_surface_temperature, ERA5/prognostic/2d/sea_ice_cover,
          ERA5/prognostic/2d/snow_depth, ERA5/prognostic/2d/total_cloud_cover, ERA5/prognostic/2d/boundary_layer_height,
          ERA5/prognostic/2d/total_column_water_vapour, ERA5/prognostic/2d/total_column_water,
          ERA5/prognostic/2d/volumetric_soil_water_layer_1, ERA5/prognostic/2d/volumetric_soil_water_layer_2,
          ERA5/prognostic/2d/volumetric_soil_water_layer_3, ERA5/prognostic/2d/volumetric_soil_water_layer_4,
          ERA5/static/2d/geopotential_at_surface, ERA5/static/2d/land_sea_mask, ERA5/static/2d/lake_cover,
          ERA5/static/2d/high_vegetation_cover, ERA5/static/2d/low_vegetation_cover,
          ERA5/static/2d/standard_deviation_of_filtered_subgrid_orography, ERA5/static/2d/standard_deviation_of_orography,
          ERA5/static/2d/angle_of_sub_gridscale_orography, ERA5/static/2d/anisotropy_of_sub_gridscale_orography,
          ERA5/static/2d/slope_of_sub_gridscale_orography, ERA5/static/2d/soil_type,
          ERA5/static/2d/type_of_high_vegetation, ERA5/static/2d/type_of_low_vegetation,
          ERA5/diagnostic/2d/mean_surface_latent_heat_flux, ERA5/diagnostic/2d/mean_surface_sensible_heat_flux]
        method: transform
    # Regrid each (normalized) lat/lon variable onto the ne120 SE grid before concat.
    latlon_to_se:
      type: tripole_to_se
      args:
        weight_file: /glade/work/schreck/repos/credit-mesaclip/mesaclip/static/latlon721x1440_to_se_ne120.nc
        source_key: ERA5
        out_key: ERA5
        fill_value: 0.0
    concat:
      type: concat
postblocks:
  per_step:
    reconstruct:
      type: reconstruct
    scaler:
      type: bridgescaler_transform
      args:
        scaler_path: config/gen_2/examples/wxformer_cubesphere_next_wb2_post_scaler.json
        variables: [ERA5/prognostic/3d/temperature, ERA5/prognostic/3d/u_component_of_wind,
          ERA5/prognostic/3d/v_component_of_wind, ERA5/prognostic/3d/specific_humidity,
          ERA5/prognostic/3d/geopotential, ERA5/prognostic/3d/vertical_velocity, ERA5/prognostic/3d/relative_humidity,
          ERA5/prognostic/3d/vorticity, ERA5/prognostic/3d/divergence, ERA5/prognostic/2d/surface_pressure,
          ERA5/prognostic/2d/2m_temperature, ERA5/prognostic/2d/10m_u_component_of_wind,
          ERA5/prognostic/2d/10m_v_component_of_wind, ERA5/prognostic/2d/mean_sea_level_pressure,
          ERA5/prognostic/2d/sea_surface_temperature, ERA5/prognostic/2d/sea_ice_cover,
          ERA5/prognostic/2d/snow_depth, ERA5/prognostic/2d/total_cloud_cover, ERA5/prognostic/2d/boundary_layer_height,
          ERA5/prognostic/2d/total_column_water_vapour, ERA5/prognostic/2d/total_column_water,
          ERA5/prognostic/2d/volumetric_soil_water_layer_1, ERA5/prognostic/2d/volumetric_soil_water_layer_2,
          ERA5/prognostic/2d/volumetric_soil_water_layer_3, ERA5/prognostic/2d/volumetric_soil_water_layer_4]
        method: inverse_transform
    # Map the (denormalized) SE prediction and target back to the native
    # 0.25 deg lat/lon grid for verification. Bilinear reverse weights here;
    # swap to *_conserve.nc when area-integral budgets matter.
    to_latlon:
      type: se_to_latlon
      args:
        weight_file: /glade/work/schreck/repos/credit-mesaclip/mesaclip/static/se_ne120_to_latlon721x1440.nc
        keys: [prediction, target]
loss:
  training_loss: mse
  validation_loss: mse
  use_power_loss: False
  use_spectral_loss: False
  use_latitude_weights: False
  use_variable_weights: False
pbs:
  project: UCSG0003
  job_name: credit_gen2
  walltime: '12:00:00'
  conda: ''
  nodes: 1
  ngpus: 4
  ncpus: 64
  mem: 480GB
  queue: main
