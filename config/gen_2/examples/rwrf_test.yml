# --------------------------------------------------------------------------------------------------------------------- #
# CREDIT starter config — gen2 data schema, 1-degree ERA5, 6-hourly CrossFormer
#
# Quick-start: edit the USER SETTINGS sections below, then:
#
#   # Preview the PBS script (no submission)
#   credit submit --cluster casper -c config/example-v2026.2.yml --gpus 4 --chain 14 --dry-run
#
#   # Submit 14 chained jobs (~70 epochs at 5 epochs/job)
#   credit submit --cluster casper  -c config/example-v2026.2.yml --gpus 4 --chain 14
#   credit submit --cluster derecho -c config/example-v2026.2.yml --gpus 4 --nodes 1 --chain 14
# --------------------------------------------------------------------------------------------------------------------- #

# ---- USER SETTINGS: output directory ---- #
save_loc: '/nwpr/ait/com181/work/credit_log/gen2_528_RWRF_v5'
seed: 1000


# ---- USER SETTINGS: training data ---- #
# Dates follow ISO 8601: "YYYY-MM-DD". The default below uses 1979–2018 for training.
data:
  source:
    RWRF:
        dataset_type: "local"
        level_coord: "pres_bottom_top"
        time_coord: "Time"
        levels: [1000, 925, 850, 700, 600, 500, 400, 300, 250, 200, 150, 100, 50]
        variables:
            prognostic:
                vars_3D: ['vmet_p', 'umet_p', 'wa_p', 'z_p', 'tk_p', 'QVAPOR_p']
                vars_2D: ['slp', 'PSFC', 'vmet10', 'umet10', 'T2', 'td2']
                path: '/nwpr/ait/com181/rwrf/*'
                filename_time_format: '%Y-%m-%d'
            
            diagnostic:
                vars_2D: ['pw']
                path: '/nwpr/ait/com181/rwrf/*'
                filename_time_format: '%Y-%m-%d'


            dynamic_forcing: null

            static: null
  start_datetime: "2024-01-01"
  end_datetime: "2024-01-31"
  timestep: "1h"

  history_len: 1            # 1 個歷史 input
  forecast_len: 1           # v2 語意：1 = 單步

  one_shot: True
  lead_time_periods: 1
  skip_periods: null
  static_first: True
  scaler_type: 'std_new'

  mean_path: '/nwpr/ait/com181/mean_rwrf.nc'
  std_path: '/nwpr/ait/com181/std_residual_rwrf.nc'



# ---- USER SETTINGS: validation data ---- #
validation_data:
  source:
    RWRF_validation:
        dataset_type: "local"
        level_coord: "pres_bottom_top"
        time_coord: "Time"
        levels: [1000, 925, 850, 700, 600, 500, 400, 300, 250, 200, 150, 100, 50]
        variables:
            prognostic:
                vars_3D: ['vmet_p', 'umet_p', 'wa_p', 'z_p', 'tk_p', 'QVAPOR_p']
                vars_2D: ['slp', 'PSFC', 'vmet10', 'umet10', 'T2', 'td2', 'pw']
                path: '/nwpr/ait/com181/rwrf/*'
                filename_time_format: '%Y-%m-%d'

            
            diagnostic:
                vars_2D: ['pw']
                path: '/nwpr/ait/com181/rwrf/*'
                filename_time_format: '%Y-%m-%d'


            dynamic_forcing: null

            static: null
  start_datetime: "2024-01-01"
  end_datetime: "2024-01-31"
  timestep: "1h"

  history_len: 1            # 1 個歷史 input
  forecast_len: 1           # v2 語意：1 = 單步

  one_shot: True
  lead_time_periods: 1
  skip_periods: null
  static_first: True
  scaler_type: 'std_new'

  mean_path: '/nwpr/ait/com181/mean_rwrf.nc'
  std_path: '/nwpr/ait/com181/std_residual_rwrf.nc'


# ============================== PREBLOCKS ============================== #
preblocks:
  norm:
    type: era5_normalizer
    args:
      mean_path: '/nwpr/ait/com181/mean_rwrf.nc'
      std_path: '/nwpr/ait/com181/std_residual_rwrf.nc'
  to_tensor:
    type: concat
    args:
      to_device: true


# ---- USER SETTINGS: training hyperparameters ---- #
trainer:
  type: era5-gen2           # use the v2 trainer (new nested data schema)

  mode: ddp               # none | ddp | fsdp  (ddp recommended for multi-GPU)
  cpu_offload: False
  activation_checkpoint: True

  load_weights: False    # set True to resume from checkpoint
  load_optimizer: False
  load_scaler: False
  load_scheduler: False
  reload_epoch: False

  skip_validation: False
  update_learning_rate: False

  save_backup_weights: True
  save_best_weights: True

  learning_rate: 1.0e-04
  weight_decay: 0

  train_batch_size: 1     # per-GPU batch size; total = batch_size × n_gpus
  valid_batch_size: 1

  batches_per_epoch: 0    # 0 = use full dataset each epoch
  valid_batches_per_epoch: 100
  stopping_patience: 999

  start_epoch: 0
  num_epoch: 70            # epochs per qsub job (checkpoint after each)
  epochs: &epochs 70      # total training target

  use_tensorboard: True
  use_ema: True           # exponential moving average of weights for validation
  ema_decay: 0.9999

  use_scheduler: True
  scheduler:
    scheduler_type: linear-warmup-cosine
    warmup_steps: 1000
    total_steps: 500000  # ~ batches/epoch × total epochs
    min_lr: 1.0e-5

  amp: False
  grad_accum_every: 1
  grad_max_norm: 'dynamic'

  thread_workers: 1
  valid_thread_workers: 1
  prefetch_factor: 2


# ---- Architecture (pre-filled for 1-degree ERA5, 181×360) ---- #
# Most users should not need to change these. If you change the grid or
# number of variables, update image_height/width, levels, channels, and
# surface_channels to match your data.
model:
  type: "wxformer"
  frames: 1
  image_height: 450       # 1-degree ERA5 latitude grid
  image_width: 450        # 1-degree ERA5 longitude grid
  levels: 13              # number of ERA5 model levels (matches data.levels above)
  channels: 6             # 3D prognostic variables (u, v, T, q)
  surface_channels: 6     # 2D prognostic variables (SP, 2T, 10U, 10V)
  input_only_channels: 0  # dynamic_forcing (2) + static (2)
  output_only_channels: 1 # diagnostic variables

  patch_width: 1
  patch_height: 1
  frame_patch_size: 1

  # Model capacity: increase dim/depth for a larger model
  dim: [128, 256, 512, 1024]
  depth: [2, 2, 8, 2]

  # Window sizes — these must divide the padded spatial dims at each stage.
  # With pad_lat=[30,30] and pad_lon=[12,12]:
  #   stage dims H=[120,60,30,15], W=[192,96,48,24] — all divisible by 8 and 3.
  global_window_size: [10, 5, 3, 1]
  local_window_size: 10
  cross_embed_kernel_sizes:
    - [4, 8, 16, 32]
    - [2, 4]
    - [2, 4]
    - [2, 4]
  cross_embed_strides: [2, 2, 2, 2]
  attn_dropout: 0.
  ff_dropout: 0.


  interp: False
  use_spectral_norm: False
  upsample_with_ps: True            # Upsample with pixel shuffle

  padding_conf:
    activate: True
    mode: earth          # spherical (latitude-wrapping) padding
    pad_lat: [ 15, 15 ]
    pad_lon: [ 15, 15 ]

  
# ---- Loss ---- #
loss:
  training_loss: "mse"
  validation_loss: 'mse'

  use_power_loss: False
  use_spectral_loss: False

  use_latitude_weights: False
  latitude_weights: '/weka/p088/CREDIT_sta_for/LSM_static_variables_ERA5_zhght.nc'
  
  use_variable_weights: False


# ---- Inference / predict (used by predict scripts, not training) ---- #
predict:
  mode: ddp
  batch_size: 8
  ensemble_size: 1
  forecasts:
    type: "custom"
    start_year: 2020
    start_month: 1
    start_day: 1
    start_hours: [ 0, 12 ]
    duration: 1
    days: 1
  save_forecast: '/glade/derecho/scratch/$USER/CREDIT_runs/starter_v2'
  use_laplace_filter: False

pbs: #derecho
  conda: "credit-derecho"
  project: "NAML0001"
  job_name: "wxformer_1deg_6hr_gen2"
  walltime: "12:00:00"
  nodes: 8
  ncpus: 64
  ngpus: 4
  mem: '480GB'
  queue: 'main'
