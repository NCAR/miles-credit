# --------------------------------------------------------------------------------------------------------------------- #
# This yaml file implements 6 hourly state-in-state-out wxformer model (v2 data schema)
# on NSF NCAR HPCs (casper.ucar.edu and derecho.hpc.ucar.edu)
# New nested data schema: source.ERA5.variables.{prognostic, diagnostic, dynamic_forcing, static}
# Data: 0.25-degree ERA5 pressure-level data (ERA5_plevel_base)
# Grid: 721 x 1440 (0.25-degree global), 13 pressure levels
# NOTE: forecast_len semantics changed — 1 means 1 step (not 0 = 1 step as in v1)
# --------------------------------------------------------------------------------------------------------------------- #
save_loc: '/glade/derecho/scratch/$USER/CREDIT_runs/wxformer_025deg_6hr_v2'
seed: 1000

# Training data block
data:
  source:
    ERA5:
      level_coord: "level"
      levels: [ 25.5, 75.0, 125.0, 175.0, 225.0, 275.0, 350.0, 450.0, 550.0, 650.0, 775.0, 887.5, 962.5 ]
      variables:
        prognostic:
          vars_3D: [ 'U', 'V', 'T', 'specific_total_water' ]
          vars_2D: [ 'SP', 'VAR_2T', 'VAR_10U', 'VAR_10V' ]
          path: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_plevel_base/all_in_one/ERA5_plevel_6h_*.zarr'

        diagnostic:
          vars_2D: [ 'total_precipitation', 'evaporation', 'top_net_thermal_radiation', 'top_net_solar_radiation',
                     'surface_latent_heat_flux', 'surface_net_solar_radiation',
                     'surface_net_thermal_radiation', 'surface_sensible_heat_flux' ]
          path: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_plevel_base/all_in_one/ERA5_plevel_6h_*.zarr'

        dynamic_forcing:
          vars_2D: [ 'toa_incident_solar_radiation', 'land_sea_CI_mask' ]
          path: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_plevel_base/all_in_one/ERA5_plevel_6h_*.zarr'

        static:
          vars_2D: [ 'z_norm', 'land_sea_mask' ]
          path: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_plevel_base/static/ERA5_plevel_6h_static.zarr'

  start_datetime: "1979-01-01"
  end_datetime: "2018-12-31"
  timestep: "6h"

  # forecast_len: 1 = 1 autoregressive step (new semantics; v1 used 0 to mean 1 step)
  history_len: 1
  forecast_len: 1

  one_shot: True
  lead_time_periods: 6
  skip_periods: null
  static_first: True
  scaler_type: 'std_new'

  mean_path: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_plevel_base/mean_std/mean_6h_1979_2019_13lev_0.25deg.nc'
  std_path: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_plevel_base/mean_std/std_6h_1979_2019_13lev_0.25deg.nc'

# Validation data block (same schema, different date range)
data_valid:
  source:
    ERA5:
      level_coord: "level"
      levels: [ 25.5, 75.0, 125.0, 175.0, 225.0, 275.0, 350.0, 450.0, 550.0, 650.0, 775.0, 887.5, 962.5 ]
      variables:
        prognostic:
          vars_3D: [ 'U', 'V', 'T', 'specific_total_water' ]
          vars_2D: [ 'SP', 'VAR_2T', 'VAR_10U', 'VAR_10V' ]
          path: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_plevel_base/all_in_one/ERA5_plevel_6h_*.zarr'

        diagnostic:
          vars_2D: [ 'total_precipitation', 'evaporation', 'top_net_thermal_radiation', 'top_net_solar_radiation',
                     'surface_latent_heat_flux', 'surface_net_solar_radiation',
                     'surface_net_thermal_radiation', 'surface_sensible_heat_flux' ]
          path: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_plevel_base/all_in_one/ERA5_plevel_6h_*.zarr'

        dynamic_forcing:
          vars_2D: [ 'toa_incident_solar_radiation', 'land_sea_CI_mask' ]
          path: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_plevel_base/all_in_one/ERA5_plevel_6h_*.zarr'

        static:
          vars_2D: [ 'z_norm', 'land_sea_mask' ]
          path: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_plevel_base/static/ERA5_plevel_6h_static.zarr'

  start_datetime: "2018-01-01"
  end_datetime: "2019-12-31"
  timestep: "6h"

  history_len: 1
  forecast_len: 1

  one_shot: True
  lead_time_periods: 6
  skip_periods: null
  static_first: True
  scaler_type: 'std_new'

  mean_path: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_plevel_base/mean_std/mean_6h_1979_2019_13lev_0.25deg.nc'
  std_path: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_plevel_base/mean_std/std_6h_1979_2019_13lev_0.25deg.nc'

trainer:
  type: era5-gen2

  mode: ddp
  cpu_offload: False
  activation_checkpoint: True

  load_weights: False
  load_optimizer: False
  load_scaler: False
  load_scheduler: False

  skip_validation: False
  update_learning_rate: False

  save_backup_weights: True
  save_best_weights: True

  learning_rate: 1.0e-03
  weight_decay: 0

  train_batch_size: 2
  valid_batch_size: 2

  batches_per_epoch: 0
  valid_batches_per_epoch: 100
  stopping_patience: 999

  start_epoch: 0
  num_epoch: 5
  reload_epoch: False
  epochs: &epochs 70

  # EMA: maintain shadow weights for validation/checkpointing
  use_tensorboard: True
  use_ema: True
  ema_decay: 0.9999

  use_scheduler: True
  # linear-warmup-cosine updates per batch (not per epoch)
  scheduler:
    scheduler_type: linear-warmup-cosine
    warmup_steps: 1000
    total_steps: 500000
    min_lr: 1.0e-5

  amp: False
  grad_accum_every: 1
  grad_max_norm: 'dynamic'

  thread_workers: 4
  valid_thread_workers: 4

  prefetch_factor: 4


model:
  type: "crossformer"
  frames: 1                         # number of input states
  image_height: 721                 # latitude grids (0.25-degree ERA5: 721)
  image_width: 1440                 # longitude grids (0.25-degree ERA5: 1440)
  levels: 13                        # number of pressure levels (matches data.levels above)
  channels: 4                       # 3D prognostic variable channels (U,V,T,q)
  surface_channels: 4               # 2D prognostic variable channels (SP,VAR_2T,VAR_10U,VAR_10V)
  input_only_channels: 4            # dynamic forcing (2) + static (2)
  output_only_channels: 8           # diagnostic variable channels

  patch_width: 1
  patch_height: 1
  frame_patch_size: 1

  dim: [ 128, 256, 512, 1024 ]
  depth: [ 2, 2, 8, 2 ]
  # 721+80=801 -> floor/2 -> 400 (=10×40), 1440+160=1600 -> /2 -> 800 (=10×80)
  # stage dims H=[400,200,100,50], W=[800,400,200,100]
  # global_window_size and local_window_size must divide all stage dims
  # [400,200,100,50] / 10 = [40,20,10,5] ✓  [800,400,200,100] / 10 = [80,40,20,10] ✓
  global_window_size: [ 10, 5, 2, 1 ]
  local_window_size: 10
  cross_embed_kernel_sizes:
    - [ 4, 8, 16, 32 ]
    - [ 2, 4 ]
    - [ 2, 4 ]
    - [ 2, 4 ]
  cross_embed_strides: [ 2, 2, 2, 2 ]
  attn_dropout: 0.
  ff_dropout: 0.

  interp: True
  use_spectral_norm: True

  padding_conf:
    activate: True
    mode: earth
    pad_lat: [ 40, 40 ]
    pad_lon: [ 80, 80 ]

  post_conf:
    activate: True
    tracer_fixer:
      activate: True
      denorm: True
      tracer_name: [ 'specific_total_water' ]
      tracer_thres: [ 1e-8 ]

loss:
  training_loss: "mse"

  use_power_loss: False
  use_spectral_loss: False

  use_latitude_weights: True
  latitude_weights: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_plevel_base/static/ERA5_plevel_6h_static.zarr'

  use_variable_weights: False

predict:
  mode: ddp
  batch_size: 4
  ensemble_size: 1
  forecasts:
    type: "custom"
    start_year: 2020
    start_month: 1
    start_day: 1
    start_hours: [ 0, 12 ]
    duration: 1
    days: 1

  metadata: 'era5.yaml'
  save_forecast: '/glade/derecho/scratch/$USER/CREDIT_runs/wxformer_025deg_6hr_v2'

  use_laplace_filter: False

pbs: #derecho
  conda: "credit-derecho"
  project: "NAML0001"
  job_name: "wxformer_025deg_6hr_v2"
  walltime: "12:00:00"
  nodes: 8
  ncpus: 64
  ngpus: 4
  mem: '480GB'
  queue: 'main'
