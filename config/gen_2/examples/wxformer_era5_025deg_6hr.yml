# --------------------------------------------------------------------------------------------------------------------- #
# This yaml file implements 6 hourly state-in-state-out wxformer model (v2 data schema)
# on NSF NCAR HPCs (casper.ucar.edu and derecho.hpc.ucar.edu)
# New nested data schema: source.ERA5.variables.{prognostic, diagnostic, dynamic_forcing, static}
# Data: 0.25-degree ERA5 pressure-level data (ERA5_plevel_base)
# Grid: 721 x 1440 (0.25-degree global), 13 pressure levels
# NOTE: forecast_len semantics changed — 1 means 1 step (not 0 = 1 step as in v1)
# --------------------------------------------------------------------------------------------------------------------- #
save_loc: '/nwpr/ait/com181/work/credit_log/529_era5_10y_wxformer_4input4output'
seed: 1000


# ---- USER SETTINGS: training data ---- #
# Dates follow ISO 8601: "YYYY-MM-DD". The default below uses 1979–2018 for training.
data:
  source:
    ERA5:
      dataset_type: "local"
      level_coord: "level"
      levels: [10, 30, 40, 50, 60, 70, 80, 90, 95, 100, 105, 110, 120, 130, 136, 137]
      variables:
      variables:
        # Prognostic: 模型預測這些變數，下一步又當輸入（自回歸）
        prognostic:
          vars_3D: ['U', 'V', 'T', 'Q']
          vars_2D: ['SP', 't2m', 'V500', 'U500', 'T500', 'Z500', 'Q500']
          path: '/weka/p088/CREDIT_data/SixHourly_y_TOTAL*12-31_staged.zarr'

        # 你沒有 diagnostic 變數 → 整段省略

        # Dynamic forcing: 時變的外部驅動（不預測）
        dynamic_forcing:
          vars_2D: ['tsi']
          path: '/weka/p088/CREDIT_sta_for/solar_irradiance_*.nc'

        # Static: 時不變的輸入（不預測）
        static:
          vars_2D: ['Z_GDS4_SFC', 'LSM']
          path: '/weka/p088/CREDIT_sta_for/static_norm_old.nc'

  start_datetime: "1999-01-01"
  end_datetime: "2008-12-31"
  timestep: "6h"

  history_len: 4            # 1 個歷史 input
  forecast_len: 1           # v2 語意：1 = 單步
  output_frames: 4

  one_shot: True
  lead_time_periods: 6
  skip_periods: null
  static_first: True
  scaler_type: 'std_new'

  mean_path: '/weka/p088/CREDIT_sta_for/mean_6h_1979_2018_16lev_0.25deg.nc'
  std_path: '/weka/p088/CREDIT_sta_for/std_residual_6h_1979_2018_16lev_0.25deg.nc'



# ---- USER SETTINGS: validation data ---- #
validation_data:
  source:
    ERA5_Validation:
      dataset_type: "local"
      level_coord: "level"
      levels: [10, 30, 40, 50, 60, 70, 80, 90, 95, 100, 105, 110, 120, 130, 136, 137]
      variables:
        prognostic:
          vars_3D: ['U', 'V', 'T', 'Q']
          vars_2D: ['SP', 't2m', 'V500', 'U500', 'T500', 'Z500', 'Q500']
          path: '/weka/p088/CREDIT_data/SixHourly_y_TOTAL*12-31_staged.zarr'

        dynamic_forcing:
          vars_2D: ['tsi']
          path: '/weka/p088/CREDIT_sta_for/solar_irradiance_*.nc'

        static:
          vars_2D: ['Z_GDS4_SFC', 'LSM']
          path: '/weka/p088/CREDIT_sta_for/static_norm_old.nc'

  start_datetime: "2009-01-01"
  end_datetime: "2009-12-31"
  timestep: "6h"

  history_len: 4
  forecast_len: 1
  output_frames: 4

  one_shot: True
  lead_time_periods: 6
  skip_periods: null
  static_first: True
  scaler_type: 'std_new'

  mean_path: '/weka/p088/CREDIT_sta_for/mean_6h_1979_2018_16lev_0.25deg.nc'
  std_path: '/weka/p088/CREDIT_sta_for/std_residual_6h_1979_2018_16lev_0.25deg.nc'

# ============================== PREBLOCKS ============================== #
preblocks:
  norm:
    type: era5_normalizer
    args:
      mean_path: '/weka/p088/CREDIT_sta_for/mean_6h_1979_2018_16lev_0.25deg.nc'
      std_path:  '/weka/p088/CREDIT_sta_for/std_residual_6h_1979_2018_16lev_0.25deg.nc'
  to_tensor:
    type: concat
    args:
      to_device: true


trainer:
  type: era5-gen2

  mode: ddp
  cpu_offload: False
  activation_checkpoint: True

  load_weights: False
  load_optimizer: False
  load_scaler: False
  load_scheduler: False

  skip_validation: False
  update_learning_rate: False

  save_backup_weights: True
  save_best_weights: True

  learning_rate: 1.0e-03
  weight_decay: 0

  train_batch_size: 2
  valid_batch_size: 2

  batches_per_epoch: 0
  valid_batches_per_epoch: 100
  stopping_patience: 999

  start_epoch: 0
  num_epoch: 5
  reload_epoch: False
  epochs: &epochs 70

  # EMA: maintain shadow weights for validation/checkpointing
  use_tensorboard: True
  use_ema: True
  ema_decay: 0.9999

  use_scheduler: True
  # linear-warmup-cosine updates per batch (not per epoch)
  scheduler:
    scheduler_type: linear-warmup-cosine
    warmup_steps: 1000
    total_steps: 500000
    min_lr: 1.0e-5

  amp: False
  grad_accum_every: 1
  grad_max_norm: 'dynamic'

  thread_workers: 2
  valid_thread_workers: 2

  prefetch_factor: 2


model:
  type: "wxformer"
  frames: 4
  output_frames: 4
  image_height: 640       # 1-degree ERA5 latitude grid
  image_width: 1280        # 1-degree ERA5 longitude grid
  levels: 16              # number of ERA5 model levels (matches data.levels above)
  channels: 4             # 3D prognostic variables (u, v, T, q)
  surface_channels: 7     # 2D prognostic variables (SP, 2T, 10U, 10V)
  input_only_channels: 3  # dynamic_forcing (2) + static (2)
  output_only_channels: 0 # diagnostic variables

  patch_width: 1
  patch_height: 1
  frame_patch_size: 1

  dim: [ 128, 256, 512, 1024 ]
  depth: [ 2, 2, 8, 2 ]
  # 721+80=801 -> floor/2 -> 400 (=10×40), 1440+160=1600 -> /2 -> 800 (=10×80)
  # stage dims H=[400,200,100,50], W=[800,400,200,100]
  # global_window_size and local_window_size must divide all stage dims
  # [400,200,100,50] / 10 = [40,20,10,5] ✓  [800,400,200,100] / 10 = [80,40,20,10] ✓
  global_window_size: [ 10, 5, 2, 1 ]
  local_window_size: 10
  cross_embed_kernel_sizes:
    - [ 4, 8, 16, 32 ]
    - [ 2, 4 ]
    - [ 2, 4 ]
    - [ 2, 4 ]
  cross_embed_strides: [ 2, 2, 2, 2 ]
  attn_dropout: 0.
  ff_dropout: 0.

  interp: True
  use_spectral_norm: True
  # upsample_v_conv: True
  upsample_with_ps: True            # Upsample with pixel shuffle


  padding_conf:
    activate: True
    mode: earth
    pad_lat: [ 80, 80 ]
    pad_lon: [ 80, 80 ]

  post_conf:
    activate: True
    tracer_fixer:
      activate: True
      denorm: True
      tracer_name: [ 'specific_total_water' ]
      tracer_thres: [ 1e-8 ]

loss:
  training_loss: "mse"

  use_power_loss: False
  use_spectral_loss: False

  use_latitude_weights: True
  latitude_weights: '/weka/p088/CREDIT_sta_for/LSM_static_variables_ERA5_zhght.nc'

  use_variable_weights: False

predict:
  mode: ddp
  batch_size: 4
  ensemble_size: 1
  forecasts:
    type: "custom"
    start_year: 2020
    start_month: 1
    start_day: 1
    start_hours: [ 0, 12 ]
    duration: 1
    days: 1

  metadata: 'era5.yaml'
  save_forecast: '/glade/derecho/scratch/$USER/CREDIT_runs/wxformer_025deg_6hr_v2'

  use_laplace_filter: False

pbs: #derecho
  conda: "credit-derecho"
  project: "NAML0001"
  job_name: "wxformer_025deg_6hr_v2"
  walltime: "12:00:00"
  nodes: 8
  ncpus: 64
  ngpus: 4
  mem: '480GB'
  queue: 'main'
