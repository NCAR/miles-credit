# --------------------------------------------------------------------------------------------------------------------- #
# Gen2 config for the wchapman model-level ERA5 data used in the original CREDIT/NPJ paper models (V1-trained).
# New nested data schema: source.ERA5.variables.{prognostic, dynamic_forcing, static}
# Data: ~0.28-degree (640×1280) ERA5 model-level data
# Grid: 640 x 1280, 16 model levels
# Variable groups are listed in V1 trainer order (prog → static → dynfrc), which matches the canonical
# FIELD_TYPE_RANK used by ConcatToTensor — so V1-trained checkpoints receive the correct channel layout.
# --------------------------------------------------------------------------------------------------------------------- #
save_loc: '/glade/derecho/scratch/$USER/CREDIT_runs/wxformer_npj_1h'

data:
  source:
    ERA5:
      dataset_type: "local"
      level_coord: "level"
      levels: [10, 30, 40, 50, 60, 70, 80, 90, 95, 100, 105, 110, 120, 130, 136, 137]
      variables:
        prognostic:
          vars_3D: ['U', 'V', 'T', 'Q']
          vars_2D: ['SP', 't2m', 'V500', 'U500', 'T500', 'Z500', 'Q500']
          path: '/glade/campaign/cisl/aiml/wchapman/MLWPS/STAGING/y_TOTAL_%Y-*.zarr'

        static:
          vars_2D: ['Z_GDS4_SFC', 'LSM']
          path: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/static_norm_old.nc'

        dynamic_forcing:
          vars_2D: ['tsi']
          path: '/glade/derecho/scratch/dgagne/credit_solar_nc_1h_0.25deg/solar_irradiance_%Y-*.nc'

        diagnostic: null

  start_datetime: "1979-01-01"
  end_datetime: "2018-12-31"
  timestep: "1h"

  history_len: 1
  forecast_len: 1

  one_shot: False
  skip_periods: null

preblocks:
  norm:
    type: era5_normalizer
    args:
      mean_path: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/mean_1h_1979_2018_16lev_0.25deg.nc'
      std_path: '/glade/campaign/cisl/aiml/ksha/CREDIT_data/std_residual_1h_1979_2018_16lev_0.25deg.nc'

trainer:
  type: gen2

  parallelism:
    data: fsdp2             # ddp | fsdp2 | none
    tensor: 1               # tensor-parallel degree  (1 = disabled)
    domain: 1               # domain-parallel shards  (1 = disabled)

  activation_checkpoint: True

  load_weights: True
  load_optimizer: False
  load_scaler: False
  load_scheduler: False

  skip_validation: False
  update_learning_rate: False

  save_backup_weights: True
  save_best_weights: True

  learning_rate: 1.0e-06
  weight_decay: 0

  train_batch_size: 1
  valid_batch_size: 1

  batches_per_epoch: 1000
  valid_batches_per_epoch: 0
  stopping_patience: 999

  start_epoch: 0
  num_epoch: 1
  reload_epoch: True
  epochs: &epochs 3

  use_ema: True
  ema_decay: 0.9999
  use_tensorboard: True

  use_scheduler: True
  scheduler: {scheduler_type: 'cosine-annealing', T_max: *epochs, last_epoch: -1}

  amp: False
  grad_accum_every: 1
  grad_max_norm: 1.0

  thread_workers: 4
  valid_thread_workers: 0

model:
  type: "wxformer"
  frames: 1
  image_height: 640
  image_width: 1280
  levels: 16
  channels: 4
  surface_channels: 7
  input_only_channels: 3
  output_only_channels: 0

  patch_width: 1
  patch_height: 1
  frame_patch_size: 1

  dim: [128, 256, 512, 1024]
  depth: [2, 2, 8, 2]
  global_window_size: [10, 5, 2, 1]
  local_window_size: 10
  cross_embed_kernel_sizes:
    - [4, 8, 16, 32]
    - [2, 4]
    - [2, 4]
    - [2, 4]
  cross_embed_strides: [2, 2, 2, 2]
  attn_dropout: 0.
  ff_dropout: 0.

  interp: False

  padding_conf:
    activate: True
    mode: earth
    pad_lat: 80
    pad_lon: 80

  post_conf:
    activate: True
    tracer_fixer:
      activate: True
      denorm: True
      tracer_name: ['Q', 'Q500']
      tracer_thres: [1e-8, 1e-8]

loss:
  training_loss: "mse"

  use_power_loss: False
  use_spectral_loss: False

  use_latitude_weights: True
  latitude_weights: "/glade/campaign/cisl/aiml/credit/static_scalers/LSM_static_variables_ERA5_zhght.nc"

  use_variable_weights: False

# ---- Inference (used by rollout_gen2.py, not training) ---- #
inference:
  run_mode: batch                   # batch | single
  mode: none                        # none | ddp | fsdp2  (distributed inference backend)
  save_forecast: '/glade/derecho/scratch/$USER/CREDIT_runs/wxformer_npj_1h'
  batch_forecast:                   # active when run_mode: batch
    forecast_length: "30d"          # forecast duration per init (e.g. "10d", "1m", "1y")
    first_init_date: "2020-01-01"   # first init time (inclusive), ISO 8601
    last_init_date: "2020-01-02"    # last init time (inclusive)
    init_interval: "12h"            # interval between init times

  single_forecast:                  # active when run_mode: single
    forecast_length: "30d"          # forecast duration
    start_datetime: "2020-01-01T00:00Z"   # init time, ISO 8601

  output:
    format: netcdf                  # netcdf | zarr
    output_interval: null           # write every Nth step; null = every step (e.g. "6h", "24h")
    group_by: null                  # null (per-step) | "day" | "month" | "year" | "full"
    variables: null                 # null = save all; or list of {name:, levels:} to subset
    metadata: "era5.yaml"           # CF attribute YAML (null = no variable attributes)
    encoding:
      dtype: float32
      zlib: true
      complevel: 4                  # 1 (fast) to 9 (small)

pbs: #derecho
  conda: "credit-derecho"
  project: "NAML0001"
  job_name: "wxformer_npj_1h"
  walltime: "12:00:00"
  nodes: 8
  ncpus: 64
  ngpus: 4
  mem: '480GB'
  queue: 'main'
