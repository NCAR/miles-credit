seed: 1000

save_loc: '/glade/derecho/scratch/schreck/model_zoo_smoke/wb2_nextgen'

# Smoke — NextGenWXFormer + WB2 ERA5 (tiny variable set)
# channels=3 levels=3 surface=2 in_only=2 out_only=0
# C_in  = 3*3 + 2 + 2 = 13
# C_out = 3*3 + 2 + 0 = 11

data:
  source:
    WeatherBench2_ERA5:
      dataset_type: "weatherbench2_era5"
      resolution: "1440x721"
      level_coord: "level"
      levels: [500, 850, 1000]
      variables:
        prognostic:
          vars_3D:
            - "temperature"
            - "u_component_of_wind"
            - "v_component_of_wind"
          vars_2D:
            - "surface_pressure"
            - "2m_temperature"
        dynamic_forcing:
          vars_2D:
            - "mean_top_downward_short_wave_radiation_flux"
        static:
          vars_2D:
            - "land_sea_mask"
        diagnostic: null

  timestep: "6h"
  forecast_len: 1
  start_datetime: "2000-01-01"
  end_datetime: "2014-12-31"

validation_data:
  start_datetime: "2018-01-01"
  end_datetime:   "2018-03-31"

preblocks:
  norm:
    type: era5_normalizer
    args:
      mean_path: "/glade/campaign/cisl/aiml/credit/static_scalers/wb2_era5_1440x721_2000_2018_v2_mean.nc"
      std_path:  "/glade/campaign/cisl/aiml/credit/static_scalers/wb2_era5_1440x721_2000_2018_v2_std.nc"
      xi_path:   "/glade/campaign/cisl/aiml/credit/static_scalers/wb2_era5_1440x721_2000_2018_v2_xi.nc"
      xi_min: 0.3
      pressure_levels: [500, 850, 1000]
  concat:
    type: concat

model:
  type: "nextgen_wxformer"
  image_height: 721
  image_width:  1440
  frames: 1
  channels: 3
  surface_channels: 2
  input_only_channels: 2
  output_only_channels: 0
  levels: 3
  dim:   [32, 64, 128, 256]
  depth: [2,  2,  4,   2  ]
  dim_head: 32
  global_window_size: [10, 5, 5, 1]
  local_window_size:  [10, 5, 5, 1]
  col_attn_heads: 3
  col_attn_stride: 1
  num_spectral_nodes: 32
  use_spectral_norm: True
  padding_conf:
    activate: True
    mode: "earth"
    pad_lat: [40, 39]
    pad_lon: [0,  0]

loss:
  training_loss: "mse"
  validation_loss: "mse"
  use_power_loss: False
  use_spectral_loss: False
  use_latitude_weights: False
  use_variable_weights: False

trainer:
  type: era5-gen2
  mode: none

  load_weights: False
  load_optimizer: False
  load_scaler: False
  load_scheduler: False

  save_backup_weights: False
  save_best_weights: False

  learning_rate: 1.0e-04
  weight_decay: 0

  train_batch_size: 1
  valid_batch_size: 1

  batches_per_epoch: 10
  valid_batches_per_epoch: 5
  stopping_patience: 999
  skip_validation: False

  start_epoch: 0
  epochs: 1

  use_scheduler: True
  scheduler:
    scheduler_type: "linear-warmup-cosine"
    warmup_steps: 3
    total_steps: 10
    min_lr: 1.0e-06

  save_metric_vars: True

  amp: False
  grad_max_norm: 1.0
  skip_nan_prune: True

  thread_workers: 2
  valid_thread_workers: 1
  prefetch_factor: 2

pbs:
  conda: "credit-casper"
  project: "NAML0001"
  job_name: "smoke_wb2_nextgen"
  walltime: "01:00:00"
  ncpus: 8
  ngpus: 1
  mem: "128GB"
  gpu_type: "v100"
  queue: "casper"
