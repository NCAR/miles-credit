seed: 1000

save_loc: '/glade/derecho/scratch/schreck/model_zoo_smoke/graphcast'

# Gen2 channel math (no diagnostics):
#   in  = 4*18 + 4 + 2 + 2 = 80
#   out = 4*18 + 4 = 76

data:
  source:
    ERA5:
      level_coord: "level"
      levels: [1., 9., 19., 29., 39., 49., 59., 69., 79., 89., 97., 104., 111., 116., 122., 126., 131., 136.]
      variables:
        prognostic:
          vars_3D: ["u_component_of_wind", "v_component_of_wind", "temperature", "specific_total_water"]
          vars_2D: ["SP", "VAR_2T", "VAR_10U", "VAR_10V"]
          path: "/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_mlevel_1deg/all_in_one/ERA5_mlevel_1deg_6h_subset_*.zarr"
          filename_time_format: "%Y"
        dynamic_forcing:
          vars_2D: ["toa_incident_solar_radiation", "land_sea_CI_mask"]
          path: "/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_mlevel_1deg/all_in_one/ERA5_mlevel_1deg_6h_subset_*.zarr"
          filename_time_format: "%Y"
        static:
          vars_2D: ["z_norm", "land_sea_mask"]
          path: "/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_mlevel_1deg/static/ERA5_mlevel_1deg_static_subset.zarr"
        diagnostic: null

  timestep: "6h"
  forecast_len: 1
  start_datetime: "2000-01-01"
  end_datetime: "2014-12-31"

validation_data:
  start_datetime: "2014-01-01"
  end_datetime: "2018-12-31"

preblocks:
  norm:
    type: era5_normalizer
    args:
      mean_path: "/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_mlevel_1deg/mean_std/mean_6h_1979_2019_conserve_1deg.nc"
      std_path: "/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_mlevel_1deg/mean_std/std_6h_1979_2019_conserve_1deg.nc"

model:
    type: "graphcast"
    in_channels: 80
    out_channels: 76
    img_size: [181, 360]
    levels: 18
    latent_dim: 128
    edge_dim: 64
    processor_depth: 4
    k_neighbours: 6
    mlp_hidden: 128

loss:
    training_loss: "mse"
    validation_loss: "mse"
    use_power_loss: False
    use_spectral_loss: False
    use_latitude_weights: True
    latitude_weights: "/glade/campaign/cisl/aiml/ksha/CREDIT_data/ERA5_mlevel_1deg/static/ERA5_mlevel_1deg_static_subset.zarr"
    use_variable_weights: False

trainer:
    type: era5-gen2
    mode: none

    load_weights: False
    load_optimizer: False
    load_scaler: False
    load_scheduler: False

    save_backup_weights: False
    save_best_weights: False

    learning_rate: 1.0e-04
    weight_decay: 0

    train_batch_size: 1
    valid_batch_size: 1

    batches_per_epoch: 50
    valid_batches_per_epoch: 10
    stopping_patience: 999
    skip_validation: False

    start_epoch: 0
    epochs: 1

    use_scheduler: False

    amp: True
    grad_max_norm: 1.0

    thread_workers: 2
    valid_thread_workers: 1
    prefetch_factor: 2

pbs:
    conda: "credit-casper"
    project: "NAML0001"
    job_name: "smoke_graphcast"
    walltime: "02:00:00"
    ncpus: 8
    ngpus: 1
    mem: '128GB'
    gpu_type: "v100"
    queue: "casper"
