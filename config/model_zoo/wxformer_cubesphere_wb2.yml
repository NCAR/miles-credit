# ------------------------------------------------------------------ #
# CubeSphereWxFormer — WeatherBench2 ERA5 (0.25°, 13 pressure levels)
#
# Dataset : WeatherBench2ERA5Dataset (same as wxformer_wb2.yml)
#   Source : gs://weatherbench2/datasets/era5/
#            1959-2023_01_10-wb13-6h-1440x721_with_derived_variables.zarr
#   Grid   : 721 × 1440, 0.25°, 6-hourly
#   Levels : 13 standard WB2 pressure levels (hPa)
#
# Grid pipeline:
# WB2 ERA5 delivers (B, C, T, 721, 1440) lat-lon tensors.
# The latlon_to_se preblock below regrids to (B, C, ncol=777602) using the
# precomputed ESMF weight file and TripoleToSEPreBlock from credit-mesaclip.
# CubeSphereWxFormer then takes (B, C, T, ncol) as input.
#
# Scalers : /glade/campaign/cisl/aiml/credit/static_scalers/
#           wb2_era5_plevel_1979_2018_{mean,std}.nc
#   Source : spatially averaged from ERA5 d633000 SE ne120np4 scalers
#            (/glade/work/schreck/mesaclip_zarr/mean_std/)
#   Period : 1979-2018
#
# Channel counts
#   channels             = 10  (3D prognostic vars × 13 levels = 130)
#   surface_channels     = 19  (2D prognostic)
#   input_only_channels  = 14  (1 dynamic_forcing + 13 static)
#   output_only_channels = 7   (diagnostic)
#
#   C_in  = 10×13 + 19 + 14 = 163
#   C_out = 10×13 + 19 + 7  = 156
# ------------------------------------------------------------------ #

save_loc: '/glade/derecho/scratch/$USER/CREDIT_runs/wxformer_cubesphere_wb2'
seed: 1000

# ---- Training data ---- #
data:
  source:
    WeatherBench2_ERA5:
      dataset_type: "weatherbench2_era5"
      resolution: "1440x721"
      level_coord: "level"
      levels: [50, 100, 150, 200, 250, 300, 400, 500, 600, 700, 850, 925, 1000]

      variables:
        prognostic:
          vars_3D:
            - "temperature"
            - "u_component_of_wind"
            - "v_component_of_wind"
            - "specific_humidity"
            - "geopotential"
            - "vertical_velocity"
            - "relative_humidity"
            - "vorticity"
            - "divergence"
            - "potential_vorticity"
          vars_2D:
            - "surface_pressure"
            - "2m_temperature"
            - "2m_dewpoint_temperature"
            - "10m_u_component_of_wind"
            - "10m_v_component_of_wind"
            - "mean_sea_level_pressure"
            - "sea_surface_temperature"
            - "sea_ice_cover"
            - "snow_depth"
            - "total_cloud_cover"
            - "boundary_layer_height"
            - "total_column_water_vapour"
            - "total_column_water"
            - "volumetric_soil_water_layer_1"
            - "volumetric_soil_water_layer_2"
            - "volumetric_soil_water_layer_3"
            - "volumetric_soil_water_layer_4"
            - "leaf_area_index_high_vegetation"
            - "leaf_area_index_low_vegetation"

        dynamic_forcing:
          vars_2D:
            - "mean_top_downward_short_wave_radiation_flux"

        static:
          vars_2D:
            - "geopotential_at_surface"
            - "land_sea_mask"
            - "lake_cover"
            - "high_vegetation_cover"
            - "low_vegetation_cover"
            - "standard_deviation_of_filtered_subgrid_orography"
            - "standard_deviation_of_orography"
            - "angle_of_sub_gridscale_orography"
            - "anisotropy_of_sub_gridscale_orography"
            - "slope_of_sub_gridscale_orography"
            - "soil_type"
            - "type_of_high_vegetation"
            - "type_of_low_vegetation"

        diagnostic:
          vars_2D:
            - "mean_surface_latent_heat_flux"
            - "mean_surface_sensible_heat_flux"
            - "mean_surface_net_long_wave_radiation_flux"
            - "mean_surface_net_short_wave_radiation_flux"
            - "mean_top_net_long_wave_radiation_flux"
            - "mean_top_net_short_wave_radiation_flux"
            - "mean_vertically_integrated_moisture_divergence"

  timestep: "6h"
  forecast_len: 1
  start_datetime: "1979-01-01"
  end_datetime:   "2018-12-31"

# ---- Validation data ---- #
validation_data:
  start_datetime: "2019-01-01"
  end_datetime:   "2022-12-31"

# ---- Model ---- #
model:
  type: "cube_sphere_wxformer"
  # Path to SE permutation index (shape 777602, int32).
  # Build with: python mesaclip/preprocessing/build_se_index.py
  se_index_path: "/glade/work/schreck/repos/credit-mesaclip/mesaclip/static/se_index_ne120.npy"
  frames: 1
  channels: 10
  surface_channels: 19
  input_only_channels: 14
  output_only_channels: 7
  levels: 13

  dim:   [64, 128, 256, 512]
  depth: [2,  2,   8,   2  ]
  dim_head: 64
  global_window_size: [6, 3, 2, 1]
  local_window_size:  12
  use_spectral_norm: True

  # Optional: path to face-adjacency file for halo exchange and edge attention.
  # Build with: python mesaclip/preprocessing/build_face_adjacency.py
  # If absent, cross-face attention still runs; boundary improvements are skipped.
  adjacency_path: "/glade/work/schreck/repos/credit-mesaclip/mesaclip/static/se_face_adjacency_ne120.npz"

# ---- Preblocks ---- #
preblocks:
  norm:
    type: era5_normalizer
    args:
      mean_path: "/glade/campaign/cisl/aiml/credit/static_scalers/wb2_era5_plevel_1979_2018_mean.nc"
      std_path:  "/glade/campaign/cisl/aiml/credit/static_scalers/wb2_era5_plevel_1979_2018_std.nc"
  latlon_to_se:
    type: tripole_to_se
    args:
      weight_file: "/glade/work/schreck/repos/credit-mesaclip/mesaclip/static/latlon721x1440_to_se_ne120.nc"
      source_key: "era5"
      out_key:    "era5"
      fill_value: 0.0

# ---- Postblocks ---- #
postblocks: {}

# ---- Loss ---- #
loss:
  training_loss: "mse"
  validation_loss: "mse"
  use_power_loss: False
  use_spectral_loss: False
  use_latitude_weights: False   # SE grid: use area weights instead when ready
  use_variable_weights: False

# ---- Trainer ---- #
trainer:
  type: era5-gen2
  mode: ddp

  load_weights:    False
  load_optimizer:  False
  load_scaler:     False
  load_scheduler:  False
  reload_epoch:    False

  save_backup_weights: True
  save_best_weights:   True

  learning_rate:   3.0e-04
  weight_decay:    1.0e-02

  train_batch_size: 1
  valid_batch_size: 1

  batches_per_epoch:       1000
  valid_batches_per_epoch: 100
  stopping_patience:       50
  skip_validation:         False

  start_epoch: 0
  num_epoch:   1
  epochs:      100

  use_tensorboard: True
  use_ema:         True
  ema_decay:       0.9999

  use_scheduler: True
  scheduler:
    scheduler_type: linear-warmup-cosine
    warmup_steps:   500
    total_steps:    0
    min_lr:         1.0e-5

  amp:              True
  grad_accum_every: 1
  grad_max_norm:    1.0

  thread_workers:       4
  valid_thread_workers: 2
  prefetch_factor:      2

# ---- PBS / job submission (Derecho) ---- #
pbs:
  project:  "NAML0001"
  job_name: "wxformer_cubesphere_wb2"
  walltime: "12:00:00"
  nodes:    4
  ncpus:    128
  ngpus:    4
  mem:      "480GB"
  queue:    "main"
  conda:    "credit-main-derecho"
