# ------------------------------------------------------------------ #
# NextGenWXFormer — WeatherBench2 ERA5 (0.25°, 13 pressure levels)
#
# Dataset : WeatherBench2ERA5Dataset
#   Source : gs://weatherbench2/datasets/era5/
#            1959-2023_01_10-wb13-6h-1440x721_with_derived_variables.zarr
#   Access : anonymous GCS streaming (no local download required)
#   Grid   : 721 × 1440, 0.25°, 6-hourly
#   Levels : 13 standard WB2 pressure levels (hPa)
#
# Scalers : /glade/campaign/cisl/aiml/credit/static_scalers/
#           wb2_era5_1440x721_2000_2018_v2_{mean,std,xi}.nc
#   Source : computed via scripts/compute_wb2_stats.py from WB2 GCS zarr
#   Period : 2000-2018
#
# Channel counts (matched vars only — 7 WB2-derived fields excluded)
#   channels             = 9   (3D prognostic vars × 13 levels = 117; pot_vort all-NaN)
#   surface_channels     = 16  (2D prognostic; 2m_dewpoint + 2 leaf areas all-NaN excluded)
#   input_only_channels  = 13  (13 static; dyn_forcing insolation all-NaN excluded)
#   output_only_channels = 2   (diagnostic: mslhf + msshf; 5 net-radiation vars all-NaN)
#
#   C_in  = 9×13 + 16 + 13 = 146
#   C_out = 9×13 + 16 + 2  = 135
#
# Padding: 721 → 800 (pad [40,39]), 1440 → 1440 (no pad)
#   800 and 1440 divisible by LCM(local_window=10, stride^4=16) = 80
# ------------------------------------------------------------------ #

save_loc: '/glade/derecho/scratch/$USER/CREDIT_runs/wxformer_wb2_025deg'
seed: 1000

# ---- Training data ---- #
data:
  source:
    WeatherBench2_ERA5:
      dataset_type: "weatherbench2_era5"
      resolution: "1440x721"
      level_coord: "level"
      levels: [50, 100, 150, 200, 250, 300, 400, 500, 600, 700, 850, 925, 1000]

      variables:
        prognostic:
          vars_3D:
            - "temperature"
            - "u_component_of_wind"
            - "v_component_of_wind"
            - "specific_humidity"
            - "geopotential"
            - "vertical_velocity"
            - "relative_humidity"
            - "vorticity"
            - "divergence"
            # potential_vorticity: all-NaN in WB2 zarr
          vars_2D:
            - "surface_pressure"
            - "2m_temperature"
            # 2m_dewpoint_temperature: all-NaN in WB2 zarr
            - "10m_u_component_of_wind"
            - "10m_v_component_of_wind"
            - "mean_sea_level_pressure"
            - "sea_surface_temperature"
            - "sea_ice_cover"
            - "snow_depth"
            - "total_cloud_cover"
            - "boundary_layer_height"
            - "total_column_water_vapour"
            - "total_column_water"
            - "volumetric_soil_water_layer_1"
            - "volumetric_soil_water_layer_2"
            - "volumetric_soil_water_layer_3"
            - "volumetric_soil_water_layer_4"
            # leaf_area_index_{high,low}_vegetation: all-NaN in WB2 zarr

        dynamic_forcing: null   # mean_top_downward_short_wave_radiation_flux: all-NaN in WB2 zarr

        static:
          vars_2D:
            - "geopotential_at_surface"
            - "land_sea_mask"
            - "lake_cover"
            - "high_vegetation_cover"
            - "low_vegetation_cover"
            - "standard_deviation_of_filtered_subgrid_orography"
            - "standard_deviation_of_orography"
            - "angle_of_sub_gridscale_orography"
            - "anisotropy_of_sub_gridscale_orography"
            - "slope_of_sub_gridscale_orography"
            - "soil_type"
            - "type_of_high_vegetation"
            - "type_of_low_vegetation"

        diagnostic:
          vars_2D:
            - "mean_surface_latent_heat_flux"
            - "mean_surface_sensible_heat_flux"
            # mean_surface/top_net_*_radiation_flux and mean_vertically_integrated_moisture_divergence
            # are all-NaN in the WB2 zarr — excluded.

  timestep: "6h"
  forecast_len: 1
  start_datetime: "1979-01-01"
  end_datetime:   "2018-12-31"

# ---- Validation data ---- #
validation_data:
  start_datetime: "2019-01-01"
  end_datetime:   "2022-12-31"

# ---- Model ---- #
model:
  type: "nextgen_wxformer"
  image_height: 721
  image_width:  1440
  frames: 1
  channels: 9
  surface_channels: 16
  input_only_channels: 13
  output_only_channels: 2
  levels: 13

  dim:              [64, 128, 256, 512]
  depth:            [2,  2,   8,   2  ]
  dim_head:         64
  global_window_size: [10, 5, 5, 1]
  local_window_size:  [10, 5, 5, 1]
  col_attn_heads:   3
  col_attn_stride:  1
  num_spectral_nodes: 64
  use_spectral_norm: True

  padding_conf:
    activate: True
    mode: "earth"
    pad_lat: [40, 39]   # 721 → 800; 800 = 10×80, divisible by LCM(10,16)=80
    pad_lon: [0,  0]    # 1440 = 18×80 — no padding needed

# ---- Preblocks ---- #
preblocks:
  norm:
    type: era5_normalizer
    args:
      mean_path: "/glade/campaign/cisl/aiml/credit/static_scalers/wb2_era5_1440x721_2000_2018_v2_mean.nc"
      std_path:  "/glade/campaign/cisl/aiml/credit/static_scalers/wb2_era5_1440x721_2000_2018_v2_std.nc"
      xi_path:   "/glade/campaign/cisl/aiml/credit/static_scalers/wb2_era5_1440x721_2000_2018_v2_xi.nc"
      xi_min: 0.3
      pressure_levels: [50, 100, 150, 200, 250, 300, 400, 500, 600, 700, 850, 925, 1000]

# ---- Postblocks ---- #
postblocks: {}

# ---- Loss ---- #
loss:
  training_loss: "mse"
  validation_loss: "mse"
  use_power_loss: False
  use_spectral_loss: False
  use_latitude_weights: True
  latitude_weights: "TODO: /path/to/wb2_era5_static.nc"
  use_variable_weights: False

# ---- Trainer ---- #
trainer:
  type: era5-gen2
  mode: ddp

  load_weights:    False
  load_optimizer:  False
  load_scaler:     False
  load_scheduler:  False
  reload_epoch:    False

  save_backup_weights: True
  save_best_weights:   True

  learning_rate:   3.0e-04
  weight_decay:    1.0e-02

  train_batch_size: 1
  valid_batch_size: 1

  batches_per_epoch:       1000
  valid_batches_per_epoch: 100
  stopping_patience:       50
  skip_validation:         False

  start_epoch: 0
  num_epoch:   1
  epochs:      100

  use_tensorboard: True
  use_ema:         True
  ema_decay:       0.9999

  use_scheduler: True
  scheduler:
    scheduler_type: linear-warmup-cosine
    warmup_steps:   500
    total_steps:    0
    min_lr:         1.0e-5

  amp:              True
  grad_accum_every: 1
  grad_max_norm:    1.0

  thread_workers:       4
  valid_thread_workers: 2
  prefetch_factor:      2

# ---- PBS / job submission (Derecho) ---- #
pbs:
  project:  "NAML0001"
  job_name: "wxformer_wb2"
  walltime: "12:00:00"
  nodes:    4
  ncpus:    128
  ngpus:    4
  mem:      "480GB"
  queue:    "main"
  conda:    "credit-main-derecho"
