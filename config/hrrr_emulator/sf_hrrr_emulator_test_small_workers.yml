# --------------------------------------------------------------------------------------------------------------------- #
# CREDIT starter config — gen2 data schema, small HRRR subset, WxFormer
#
# Quick-start: edit the USER SETTINGS sections below, then:
#
#   # Preview the PBS script (no submission)
#   credit submit --cluster casper -c config/example-v2026.2.yml --gpus 4 --chain 14 --dry-run
#
#   # Submit 14 chained jobs (~70 epochs at 5 epochs/job)
#   credit submit --cluster casper  -c config/example-v2026.2.yml --gpus 4 --chain 14
#   credit submit --cluster derecho -c config/example-v2026.2.yml --gpus 4 --nodes 1 --chain 14
# --------------------------------------------------------------------------------------------------------------------- #

# ---- USER SETTINGS: output directory ---- #
save_loc: "/glade/derecho/scratch/$USER/CREDIT_runs/gen2_integration_test_hrrr"
# save_loc: "/glade/derecho/scratch/$USER/CREDIT_runs/gen2_integration_test_hrrr_ddp"
seed: 1000


# ---- USER SETTINGS: training data ---- #
# Dates follow ISO 8601: "YYYY-MM-DD". The default below uses 1979–2018 for training.
data:
  source:
    Example_HRRR:
      dataset_type: "hrrr"
      product: "wrfnat"
      mode: "remote"
      level_coord: "level"
      levels: [1, 3, 5, 7, 9, 11]
      variables:
        # Prognostic: model both predicts and receives as input next step
        prognostic:
          vars_3D: ['T', 'U', 'V', 'Q', 'P', 'GH']
          vars_2D: ['sp', 't2m', 'd2m']

        # Diagnostic: model predicts these but does not feed them back as input
        diagnostic: null

        # Dynamic forcing: time-varying inputs (not predicted)
        dynamic_forcing: null

        # Static: time-invariant inputs (not predicted)
        static:
          vars_2D: [ 'orog' ]
      # [lon_min, lon_max, lat_min, lat_max]
      extent: [-124.358202, -120.477473, 36.527802, 38.797260]
      # should be from 38.797260, -124.358202 to 36.527802, -120.477473

  start_datetime: "2024-01-01"
  end_datetime: "2025-01-01"
  timestep: "1h"

  # history_len: 1            # number of past states fed as input
  forecast_len: 1           # autoregressive steps per training sample (1 = single-step)


# ---- USER SETTINGS: validation data ---- #
validation_data:
  start_datetime: "2025-01-01"
  end_datetime: "2026-01-01"
  timestep: "1h"

  forecast_len: 1

# ---- USER SETTINGS: preblocks/postblocks before/after passed to model ---- #

preblocks:
  per_step:
    pressure_log_transform:
      type: "log_transform"
      args:
        variables:
          - 'Example_HRRR/prognostic/2d/sp'
        data_types:
          - 'input'
          - 'target'

    q_sqrt_transform:
        type: "sqrt_transform"
        args:
            variables:
                  - 'Example_HRRR/prognostic/3d/Q'
            data_types:
              - 'input'
              - 'target'

    scaler:
      # please run `credit preprocess` before `credit train`
      type: "bridgescaler_transform"
      args:
        variables: []
        scaler_path: "/glade/derecho/scratch/$USER/CREDIT_runs/gen2_integration_test_hrrr/scaler_quantile.json"
        scaler_type: "standard"
        scaler_params:
          channels_last: False

    vars_concat:
      type: "concat"

postblocks:
  per_step:
    reconstruct:
      type: "reconstruct"

# ---- USER SETTINGS: training hyperparameters ---- #
trainer:
  type: gen2           # use the v2 trainer (new nested data schema)

  parallelism:
    data: none              # ddp | fsdp2 | none
    tensor: 1               # tensor-parallel degree  (1 = disabled)
    domain: 1               # domain-parallel shards  (1 = disabled)

  cpu_offload: False
  activation_checkpoint: True

  load_weights: False     # set True to resume from checkpoint
  load_optimizer: False
  load_scaler: False
  load_scheduler: False
  reload_epoch: False

  skip_validation: False
  update_learning_rate: False

  save_backup_weights: True
  save_best_weights: True

  learning_rate: 1.0e-03
  weight_decay: 0

  train_batch_size: 1     # per-GPU batch size; total = batch_size × n_gpus
  valid_batch_size: 1

  batches_per_epoch: 0    # 0 = use full dataset each epoch
  valid_batches_per_epoch: 100
  stopping_patience: 999

  start_epoch: 0
  # num_epoch: 2            # epochs per qsub job (checkpoint after each)
  epochs: &epochs 70      # total training target

  use_tensorboard: True
  use_ema: True           # exponential moving average of weights for validation
  ema_decay: 0.9999

  use_scheduler: True
  scheduler:
    scheduler_type: linear-warmup-cosine
    warmup_steps: 1000
    total_steps: 500000  # ~ batches/epoch × total epochs
    min_lr: 1.0e-5

  amp: False
  grad_accum_every: 1
  grad_max_norm: 'dynamic'

  thread_workers: 0
  valid_thread_workers: 0
  prefetch_factor: none


# ---- Architecture (based on HRRR Extent, A×B) ---- #
# Most users should not need to change these. If you change the grid or
# number of variables, update image_height/width, levels, channels, and
# surface_channels to match your data.
model:
  type: "wxformer"
  frames: 1
  image_height: 111       # Updated for new HRRR extent
  image_width: 132        # Updated for new HRRR extent
  levels: 6               # Bottom 6 odd levels (1, 3, 5, 7, 9, 11)
  channels: 6             # 3D prognostic variables (T, U, V, Q, P, GH)
  surface_channels: 3     # 2D prognostic variables (sp, t2m, d2m)
  input_only_channels: 1  # static (orog)
  output_only_channels: 0 # no diagnostic predicted

  patch_width: 1
  patch_height: 1
  frame_patch_size: 1

  # Model capacity: increase dim/depth for a larger model
  dim: [32, 64, 128, 256]
  depth: [ 2, 2, 8, 2 ]

  # Window sizes — these must divide the padded spatial dims at each stage.
  # With pad_lat=[9,8] and pad_lon=[30,30]:
  #   stage dims H=[64,32,16,8], W=[96,48,24,12] — all divisible by window sizes.
  global_window_size: [ 8, 4, 2, 1 ]
  local_window_size: 4
  cross_embed_kernel_sizes:
    - [ 4, 8, 16, 32 ]
    - [ 2, 4 ]
    - [ 2, 4 ]
    - [ 2, 4 ]
  cross_embed_strides: [ 2, 2, 2, 2 ]
  attn_dropout: 0.
  ff_dropout: 0.

  interp: False
  use_spectral_norm: True
  upsample_with_ps: True            # Upsample with pixel shuffle

  padding_conf:
    activate: True
    mode: mirror          # switch to mirror since it is a local extent
    pad_lat: [ 9, 8 ]     # Produce dimensions of 111+9+8=128 ...
    pad_lon: [ 30, 30 ]   # and 132+30+30=192, divisible by 64 (local window size 4 at stage 4)

  
# ---- Loss ---- #
loss:
  training_loss: "mse"
  validation_loss: "mse"

  use_power_loss: False
  use_spectral_loss: False
  use_latitude_weights: False
  use_variable_weights: False


# ---- Inference (used by rollout_gen2.py, not training) ---- #
#
# run_mode selects between batch and single forecast without requiring CLI flags.
#   batch:  generates forecasts for a range of init times defined under batch_forecast.initialization
#   single: runs one forecast from a specific init time defined under single_forecast.start_datetime
#
# CLI overrides (all optional):
#   --run-mode batch|single     overrides run_mode
#   --init-time YYYY-MM-DDTHH  overrides single_forecast.start_datetime
#   --save-dir /path            overrides save_forecast
#
inference:
  run_mode: batch                   # batch | single
  mode: ddp                        # none | ddp | fsdp
  save_forecast: '/glade/derecho/scratch/$USER/CREDIT_runs/starter_gen2/rollout'

  batch_forecast:
    forecast_length: "10d"             # total forecast duration (total valid lead time)
    first_init_date: "2020-01-01"      # first init time; must be within data date range
    last_init_date: "2020-01-10"       # last init time; must be within data date range
    init_interval: "12h"               # interval between init times

  single_forecast:
    forecast_length: "10d"
    start_datetime: "2020-06-01T00:00Z"   # ISO 8601; must be within data date range
    # init_data block reserved for future GFS/GEFS IC support:
    # init_data:
    #   type: "gfs"                 # era5 (default) | gfs | gefs
    #   cache_path: "/glade/scratch/$USER/ic_cache"
    #   force_download: false

  output:
    format: netcdf              # netcdf | zarr

    # Temporal subsampling: only write steps whose forecast hour is a multiple
    # of this value. null = write every step.
    output_interval: null           # null | "6h" | "24h" | ...

    # Calendar-period grouping: how many steps to concatenate into one file.
    # Output lands in  save_forecast/YYYYMMDD_HHMMZ/  (one subdirectory per init time).
    # null    → one file per step:    2020-06-01_T0600Z.nc
    # "day"   → one file per day:     2020-06-01.nc
    # "month" → one file per month:   2020-06.nc
    # "year"  → one file per year:    2020.nc
    # "full"  → one file per run:     full.nc
    group_by: day           # null | "day" | "month" | "year" | "full"

    # Variable filter. null = save all predicted variables.
    # Each entry names a y_processed key (source/type/dim/varname).
    # For 3D variables, "levels" subsets by model-level value (matches
    # data.source.ERA5.levels); null or omitted = all levels.
    variables: null
    # variables:
    #   - name: "ERA5/prognostic/3d/temperature"
    #     levels: null                              # null = all levels
    #   - name: "ERA5/prognostic/3d/u_component_of_wind"
    #     levels: [500, 850, 1000]                  # subset to these model levels
    #   - name: "ERA5/prognostic/2d/SP"
    #   - name: "ERA5/diagnostic/2d/total_precipitation"

    # CF attribute metadata. null = no variable attributes added.
    metadata: "era5.yaml"

    # NetCDF encoding. "default" applies to all variables.
    # Per-variable overrides use the full y_processed key or the short variable name.
    encoding:
      dtype: float32
      zlib: true
      complevel: 4            # 1 (fast) to 9 (small); 4 is a good default
      # "ERA5/diagnostic/2d/total_precipitation":
      #   dtype: float64
      #   zlib: true
      #   complevel: 6


