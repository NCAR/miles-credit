# --------------------------------------------------------------------------------------------------------------------- #
# CREDIT starter config — gen2 data schema, small HRRR subset, WxFormer
#
# Quick-start: edit the USER SETTINGS sections below, then:
#
#   # Preview the PBS script (no submission)
#   credit submit --cluster casper -c config/example-v2026.2.yml --gpus 4 --chain 14 --dry-run
#
#   # Submit 14 chained jobs (~70 epochs at 5 epochs/job)
#   credit submit --cluster casper  -c config/example-v2026.2.yml --gpus 4 --chain 14
#   credit submit --cluster derecho -c config/example-v2026.2.yml --gpus 4 --nodes 1 --chain 14
# --------------------------------------------------------------------------------------------------------------------- #

# ---- USER SETTINGS: output directory ---- #
save_loc: '/glade/derecho/scratch/$USER/CREDIT_runs/gen2_integration_test_hrrr'
seed: 1000


# ---- USER SETTINGS: training data ---- #
# Dates follow ISO 8601: "YYYY-MM-DD". The default below uses 1979–2018 for training.
data:
  source:
    Example_HRRR:
      dataset_type: "hrrr"
      product: "wrfnat"
      mode: "remote"
      level_coord: "level"
      levels: [1, 3, 5, 7, 9, 11]
      variables:
        # Prognostic: model both predicts and receives as input next step
        prognostic:
          vars_3D: ['T', 'U', 'V', 'Q', 'P', 'GH']
          vars_2D: ['sp', 't2m', 'd2m']

        # Diagnostic: model predicts these but does not feed them back as input
        diagnostic: null

        # Dynamic forcing: time-varying inputs (not predicted)
        dynamic_forcing: null

        # Static: time-invariant inputs (not predicted)
        static:
          vars_2D: [ 'orog' ]
      # [lon_min, lon_max, lat_min, lat_max]
      extent: [-124.358202, -120.477473, 36.527802, 38.797260]
      # should be from 38.797260, -124.358202 to 36.527802, -120.477473

  start_datetime: "2024-01-01"
  end_datetime: "2025-01-01"
  timestep: "1h"

  # history_len: 1            # number of past states fed as input
  forecast_len: 1           # autoregressive steps per training sample (1 = single-step)

  # one_shot: True
  # lead_time_periods: 1
  # skip_periods: null
  # static_first: True
  # scaler_type: 'std_new'


# ---- USER SETTINGS: validation data ---- #
validation_data:
  start_datetime: "2025-01-01"
  end_datetime: "2026-01-01"
  timestep: "1h"

# ---- USER SETTINGS: preblocks/postblocks before/after passed to model ---- #

preblocks:
  per_step:
    pressure_log_transform:
      type: "log_transform"
      args:
        variables:
          - 'Example_HRRR/prognostic/2d/sp'
        data_types:
          - 'input'
          - 'target'

    q_sqrt_transform:
        type: "sqrt_transform"
        args:
            variables:
                  - 'Example_HRRR/prognostic/3d/Q'
            data_types:
              - 'input'
              - 'target'

    scaler:
      # please run `credit preprocess` before `credit train`
      type: "bridgescaler_transformer"
      args:
        variables: []
        scaler_path: "/glade/derecho/scratch/$USER/CREDIT_runs/gen2_integration_test_hrrr/scaler_quantile.json"
        scaler_type: "standard"
        scaler_params:
          channels_last: False

    vars_concat:
      type: "concat"

postblocks:
  per_step:
    reconstruct:
      type: "reconstruct"

# ---- USER SETTINGS: training hyperparameters ---- #
trainer:
  type: era5-gen2           # use the v2 trainer (new nested data schema)

  mode: "none"              # none | ddp | fsdp  (ddp recommended for multi-GPU)
  cpu_offload: False
  activation_checkpoint: True

  load_weights: False     # set True to resume from checkpoint
  load_optimizer: False
  load_scaler: False
  load_scheduler: False
  reload_epoch: False

  skip_validation: False
  update_learning_rate: False

  save_backup_weights: True
  save_best_weights: True

  learning_rate: 1.0e-03
  weight_decay: 0

  train_batch_size: 8     # per-GPU batch size; total = batch_size × n_gpus
  valid_batch_size: 8

  batches_per_epoch: 0    # 0 = use full dataset each epoch
  valid_batches_per_epoch: 100
  stopping_patience: 999

  start_epoch: 0
  num_epoch: 2            # epochs per qsub job (checkpoint after each)
  epochs: &epochs 70      # total training target

  use_tensorboard: True
  use_ema: True           # exponential moving average of weights for validation
  ema_decay: 0.9999

  use_scheduler: True
  scheduler:
    scheduler_type: linear-warmup-cosine
    warmup_steps: 1000
    total_steps: 500000  # ~ batches/epoch × total epochs
    min_lr: 1.0e-5

  amp: False
  grad_accum_every: 1
  grad_max_norm: 'dynamic'

  thread_workers: 64
  valid_thread_workers: 64
  prefetch_factor: 8


# ---- Architecture (based on HRRR Extent, A×B) ---- #
# Most users should not need to change these. If you change the grid or
# number of variables, update image_height/width, levels, channels, and
# surface_channels to match your data.
model:
  type: "wxformer"
  frames: 1
  image_height: 111       # Updated for new HRRR extent
  image_width: 132        # Updated for new HRRR extent
  levels: 6               # Bottom 6 odd levels (1, 3, 5, 7, 9, 11)
  channels: 6             # 3D prognostic variables (T, U, V, Q, P, GH)
  surface_channels: 3     # 2D prognostic variables (sp, t2m, d2m)
  input_only_channels: 1  # static (orog)
  output_only_channels: 0 # no diagnostic predicted

  patch_width: 1
  patch_height: 1
  frame_patch_size: 1

  # Model capacity: increase dim/depth for a larger model
  dim: [32, 64, 128, 256]
  depth: [ 2, 2, 8, 2 ]

  # Window sizes — these must divide the padded spatial dims at each stage.
  # With pad_lat=[9,8] and pad_lon=[30,30]:
  #   stage dims H=[64,32,16,8], W=[96,48,24,12] — all divisible by window sizes.
  global_window_size: [ 8, 4, 2, 1 ]
  local_window_size: 4
  cross_embed_kernel_sizes:
    - [ 4, 8, 16, 32 ]
    - [ 2, 4 ]
    - [ 2, 4 ]
    - [ 2, 4 ]
  cross_embed_strides: [ 2, 2, 2, 2 ]
  attn_dropout: 0.
  ff_dropout: 0.

  interp: False
  use_spectral_norm: True
  upsample_with_ps: True            # Upsample with pixel shuffle

  padding_conf:
    activate: True
    mode: mirror          # switch to mirror since it is a local extent
    pad_lat: [ 9, 8 ]     # Produce dimensions of 111+9+8=128 ...
    pad_lon: [ 30, 30 ]   # and 132+30+30=192, divisible by 64 (local window size 4 at stage 4)

  
# ---- Loss ---- #
loss:
  training_loss: "mse"
  validation_loss: "mse"

  use_power_loss: False
  use_spectral_loss: False
  use_latitude_weights: False
  use_variable_weights: False


# ---- Inference / predict (used by predict scripts, not training) ---- #
predict:
  mode: ddp
  batch_size: 8
  ensemble_size: 1
  forecasts:
    type: "custom"
    start_year: 2025
    start_month: 1
    start_day: 1
    start_hours: [ 0, 12 ]
    duration: 1
    days: 1
  save_forecast: '/glade/derecho/scratch/$USER/CREDIT_runs/starter_v2'
  use_laplace_filter: False

pbs: #derecho
  conda: "credit-derecho"
  project: "NAML0001"
  job_name: "credit_integration_test_hrrr_gen2"
  walltime: "01:00:00"
  nodes: 8
  ncpus: 64
  ngpus: 4
  mem: '480GB'
  queue: 'main'
