save_loc: /glade/derecho/scratch/schreck/credit_tests/smoke_v2parallel_ddp
seed: 1000
data:
  source:
    ERA5:
      dataset_type: local
      level_coord: level
      levels:
      - 10
      - 30
      - 40
      - 50
      - 60
      - 70
      - 80
      - 90
      - 95
      - 100
      - 105
      - 110
      - 120
      - 130
      - 136
      - 137
      variables:
        prognostic:
          vars_3D:
          - U
          - V
          - T
          - Q
          vars_2D:
          - SP
          - t2m
          - V500
          - U500
          - T500
          - Z500
          - Q500
          path: /glade/campaign/cisl/aiml/credit/era5_zarr/SixHourly_y_TOTAL_%Y-*
        dynamic_forcing:
          vars_2D:
          - tsi
          path: /glade/campaign/cisl/aiml/credit/credit_solar_nc_6h_0.25deg/solar_irradiance_%Y*.nc
        static:
          vars_2D:
          - Z_GDS4_SFC
          - LSM
          path: /glade/campaign/cisl/aiml/credit/static_scalers/static_norm_old.nc
        diagnostic: null
  timestep: 6h
  forecast_len: 1
  start_datetime: '2015-01-01'
  end_datetime: '2016-12-31'
validation_data:
  start_datetime: '2017-01-01'
  end_datetime: '2018-12-31'
preblocks:
  per_step:
    scaler:
      type: bridgescaler_transform
      args:
        scaler_path: /glade/campaign/cisl/aiml/credit/bridgescaler/wxformer_025deg_gen2_pre_scaler.json
        variables:
        - ERA5/prognostic/3d/U
        - ERA5/prognostic/3d/V
        - ERA5/prognostic/3d/T
        - ERA5/prognostic/3d/Q
        - ERA5/prognostic/2d/SP
        - ERA5/prognostic/2d/t2m
        - ERA5/prognostic/2d/V500
        - ERA5/prognostic/2d/U500
        - ERA5/prognostic/2d/T500
        - ERA5/prognostic/2d/Z500
        - ERA5/prognostic/2d/Q500
        - ERA5/dynamic_forcing/2d/tsi
        method: transform
    concat:
      type: concat
model:
  type: wxformer
  frames: 1
  image_height: 640
  image_width: 1280
  levels: 16
  channels: 4
  surface_channels: 7
  input_only_channels: 3
  output_only_channels: 0
  patch_width: 1
  patch_height: 1
  frame_patch_size: 1
  dim:
  - 8
  - 16
  - 32
  - 64
  dim_head: 8
  depth:
  - 2
  - 2
  - 2
  - 2
  global_window_size:
  - 10
  - 5
  - 2
  - 1
  local_window_size: 5
  cross_embed_kernel_sizes:
  - - 4
    - 8
    - 16
    - 32
  - - 2
    - 4
  - - 2
    - 4
  - - 2
    - 4
  cross_embed_strides:
  - 2
  - 2
  - 2
  - 2
  attn_dropout: 0.0
  ff_dropout: 0.0
  use_spectral_norm: true
  interp: true
  padding_conf:
    activate: true
    mode: earth
    pad_lat:
    - 80
    - 80
    pad_lon:
    - 80
    - 80
  post_conf:
    activate: false
loss:
  training_loss: mse
  validation_loss: mse
  use_power_loss: false
  use_spectral_loss: false
  use_latitude_weights: true
  latitude_weights: /glade/campaign/cisl/aiml/credit/static_scalers/LSM_static_variables_ERA5_zhght.nc
  use_variable_weights: false
trainer:
  type: era5-gen2
  parallelism:
    data: ddp
    tensor: 1
    domain: 1
  load_weights: false
  load_optimizer: false
  load_scaler: false
  load_scheduler: false
  save_backup_weights: false
  save_best_weights: true
  save_metric_vars: true
  update_learning_rate: false
  learning_rate: 0.001
  weight_decay: 0
  train_batch_size: 1
  valid_batch_size: 1
  ensemble_size: 1
  batches_per_epoch: 5
  valid_batches_per_epoch: 2
  stopping_patience: 50
  skip_validation: false
  start_epoch: 0
  num_epoch: 1
  reload_epoch: false
  epochs: 1
  use_scheduler: true
  scheduler:
    scheduler_type: cosine-annealing-restarts
    first_cycle_steps: 50
    cycle_mult: 1.0
    max_lr: 0.001
    min_lr: 1.0e-06
    warmup_steps: 10
    gamma: 1.0
  amp: false
  grad_accum_every: 1
  grad_max_norm: 1.0
  thread_workers: 4
  valid_thread_workers: 2
  prefetch_factor: 2
pbs:
  conda: /glade/work/schreck/conda-envs/credit-main-derecho
  job_name: smoke_v2_ddp
  project: NAML0001
  walltime: 01:00:00
  nodes: 1
  ncpus: 64
  ngpus: 4
  mem: 480GB
  queue: develop@desched1
postblocks:
  per_step:
    reconstruct:
      type: reconstruct
    scaler:
      type: bridgescaler_transform
      args:
        scaler_path: /glade/campaign/cisl/aiml/credit/bridgescaler/wxformer_025deg_gen2_post_scaler.json
        variables:
        - ERA5/prognostic/3d/U
        - ERA5/prognostic/3d/V
        - ERA5/prognostic/3d/T
        - ERA5/prognostic/3d/Q
        - ERA5/prognostic/2d/SP
        - ERA5/prognostic/2d/t2m
        - ERA5/prognostic/2d/V500
        - ERA5/prognostic/2d/U500
        - ERA5/prognostic/2d/T500
        - ERA5/prognostic/2d/Z500
        - ERA5/prognostic/2d/Q500
        method: inverse_transform
