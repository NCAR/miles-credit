name: Python Package using Mamba

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: write
  checks: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: | 
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install . 
          pip install ruff pytest pytest-cov
      - name: Test with pytest
        run: |
          pytest
      - name: Pytest Coverage
        run: |
           pytest --cov=credit --cov-branch --cov-report=xml
        #  pytest --cov=credit tests/ | tee pytest-coverage.txt
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
            token: ${{ secrets.CODECOV_TOKEN }} 
      #- name: Pytest coverage comment
      #  uses: MishaKav/pytest-coverage-comment@1bdbba85fb74a2fdc1ec66383acec1091610f82b # v1.1.57
