name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{matrix.python-version}}
          cache: 'pip'
      - name: ESMF support Package Install
        run: |
          sudo apt-get -qq -y update
          sudo apt -qq install libnetcdf-dev libnetcdff-dev
      - name: Install ESMF
        uses: esmf-org/install-esmf-action@39afafec8570201bcf14ccdba7ffc246278f8d21 # v1.0.2
        env:
          ESMF_NETCDF: nc-config
        with:
          version: v8.6.0
          esmpy: true
          cache: true
      - name: Print ESMF Info
        run: |
          cat ${ESMFMKFILE}
      - name: Install dependencies
        run: | 
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install . 
          pip install pytest pytest-cov
          pip install xesmf
      - name: Run tests
        run: |
          pytest --cov=credit --cov-branch --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
            env_vars: PYTHON
            token: ${{ secrets.CODECOV_TOKEN }}

