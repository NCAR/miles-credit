  timestep: "6h"
  forecast_len: 1
#  start_datetime: "2015-01-01"
#  end_datetime: "2016-12-31"
  start_datetime: "2021-06-01"
  end_datetime: "2021-06-04"

#validation_data:
#  start_datetime: "2017-01-01"
#  end_datetime: "2018-12-31"

#preblocks:
#  norm:
#    type: era5_normalizer
#    args:
#      mean_path: "/glade/campaign/cisl/aiml/credit/static_scalers/mean_6h_1979_2018_16lev_0.25deg.nc"
#      std_path:  "/glade/campaign/cisl/aiml/credit/static_scalers/std_6h_1979_2018_16lev_0.25deg.nc"

model:
    type: "crossformer"
    frames: 1
    image_height: 640
    image_width: 1280
#    levels: 16
#    channels: 4
#    surface_channels: 7
#    input_only_channels: 3
#    output_only_channels: 0
    levels: 0
    channels: 0
    surface_channels: 2
    input_only_channels: 0
    output_only_channels: 0

    patch_width: 1
    patch_height: 1
    frame_patch_size: 1

#    dim: [32, 64, 128, 256]
#    dim: [512, 1024, 2048, 4096]
#    dim: [256, 512, 1024, 2048]
    dim: [128, 256, 512, 1024]
    depth: [2, 2, 2, 2]
    global_window_size: [10, 5, 2, 1]
    local_window_size: 10
    cross_embed_kernel_sizes:
    - [4, 8, 16, 32]
    - [2, 4]
    - [2, 4]
    - [2, 4]
    cross_embed_strides: [2, 2, 2, 2]
    attn_dropout: 0.
    ff_dropout: 0.

#    use_spectral_norm: True
#    interp: True
    use_spectral_norm: False
    interp: False

    padding_conf:
        activate: True
        mode: "earth"
        pad_lat: [80, 80]
        pad_lon: [80, 80]

    post_conf:
        activate: False

loss:
    training_loss: "mse"
    validation_loss: "mse"
    use_power_loss: False
    use_spectral_loss: False
    use_latitude_weights: False
#    use_latitude_weights: True
    latitude_weights: '/glade/campaign/cisl/aiml/credit/static_scalers/LSM_static_variables_ERA5_zhght.nc'
    use_variable_weights: False

trainer:
    type: era5-gen2
#    mode: none
    mode: ddp
    
    load_weights: False
    load_optimizer: False
    load_scaler: False
    load_scheduler: False

    save_backup_weights: False
    save_best_weights: True
    save_metric_vars: True

    update_learning_rate: False
    learning_rate: 1.0e-03
    weight_decay: 0

    train_batch_size: 1
    valid_batch_size: 1
    ensemble_size: 1

    batches_per_epoch: 4
    valid_batches_per_epoch: 2
    stopping_patience: 50
    skip_validation: True

    start_epoch: 0
    num_epoch: 1
    reload_epoch: False
    epochs: 1

    use_scheduler: True
    scheduler:
      scheduler_type: cosine-annealing-restarts
      first_cycle_steps: 50
      cycle_mult: 1.0
      max_lr: 1.0e-03
      min_lr: 1.0e-06
      warmup_steps: 10
      gamma: 1.0

    amp: True
    mixed_precision:
        param_dtype: "bfloat16"
        reduce_dtype: "bfloat16"
        buffer_dtype: "bfloat16"
    grad_accum_every: 1
    grad_max_norm: 1.0

    thread_workers: 0
#    thread_workers: 4
    valid_thread_workers: 2
#    prefetch_factor: 2
    prefetch_factor: 1

pbs:
    conda: "credit-main-casper"
    job_name: "smoke_gen2"
    nodes: 1
    ncpus: 8
    ngpus: 1
    mem: '64GB'
    walltime: '1:00:00'
    gpu_type: 'v100'
    project: 'NAML0001'
    queue: 'casper'
